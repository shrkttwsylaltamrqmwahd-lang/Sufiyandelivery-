<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة المطعم | نظام الحوت للتوصيل</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 800px; margin-top: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-brand { color: #2c3e50; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .hidden-section { display: none; }
        #map { height: 300px; width: 100%; border-radius: 10px; margin-top: 10px; }
        .btn-primary { background-color: #3498db; border: none; }
        .btn-success { background-color: #27ae60; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h2>سفيان لتوصيل الطعام - بوابة المطاعم</h2>
    </div>

    <div id="registrationSection" class="card p-4">
        <h4 class="mb-3">تسجيل مطعم جديد</h4>
        <form id="regForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">اسم المطعم</label>
                    <input type="text" id="resName" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">منطقة المطعم</label>
                    <select id="resArea" class="form-select" required>
                        <option value="">اختر المنطقة...</option>
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" id="resPhone" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">العمولة الثابتة (IQD)</label>
                    <input type="number" id="commission" class="form-control" placeholder="مثلاً 2000" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label">نظام دفع العمولة</label>
                    <select id="paySystem" class="form-select" required>
                        <option value="مطعم">على المطعم بالكامل</option>
                        <option value="مناصفة">مناصفة مع السائق</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">حدد موقعك على الخريطة</label>
                    <div id="map"></div>
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                    <small class="text-muted">سيتم التقاط إحداثياتك تلقائياً عند السماح بالوصول للموقع.</small>
                </div>
                <button type="submit" class="btn btn-primary mt-4">إرسال طلب الانضمام للمدير</button>
            </div>
        </form>
    </div>

    <div id="orderSection" class="card p-4 hidden-section">
        <h4 class="mb-3 text-success">إرسال طلبية جديدة</h4>
        <div class="mb-4">
            <label class="form-label">طريقة الإدخال</label>
            <div class="btn-group w-100" role="group">
                <button type="button" class="btn btn-outline-secondary active" onclick="switchMethod('manual')">إدخال يدوي</button>
                <button type="button" class="btn btn-outline-secondary" onclick="switchMethod('photo')">التقاط صورة الوصل</button>
            </div>
        </div>

        <form id="orderForm">
            <div id="manualInput">
                <div class="mb-3">
                    <label class="form-label">منطقة الزبون</label>
                    <select id="customerArea" class="form-select">
                        <option value="">اختر منطقة الزبون...</option>
                        </select>
                </div>
                <div class="mb-3" id="phoneField">
                    <label class="form-label">رقم هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="form-control">
                </div>
            </div>

            <div id="photoInput" class="hidden-section mb-3">
                <label class="form-label">تصوير الوصل</label>
                <input type="file" id="orderImg" class="form-control" accept="image/*" capture="camera">
            </div>

            <button type="submit" class="btn btn-success w-100 p-2">إرسال الطلب للنظام</button>
        </form>
        <div id="statusMsg" class="mt-3 text-center"></div>
    </div>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
<script>
    let map, marker;

    function initMap() {
        // الافتراضي: مركز المدينة
        const defaultLoc = { lat: 35.467, lng: 44.392 }; 
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 14,
            center: defaultLoc,
        });
        marker = new google.maps.Marker({
            position: defaultLoc,
            map: map,
            draggable: true
        });

        // الحصول على الموقع الحالي للمطعم
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setCenter(myLoc);
                marker.setPosition(myLoc);
                document.getElementById('lat').value = myLoc.lat;
                document.getElementById('lng').value = myLoc.lng;
            });
        }

        google.maps.event.addListener(marker, 'dragend', function() {
            document.getElementById('lat').value = marker.getPosition().lat();
            document.getElementById('lng').value = marker.getPosition().lng();
        });
    }

    function switchMethod(method) {
        if(method === 'manual') {
            document.getElementById('manualInput').classList.remove('hidden-section');
            document.getElementById('photoInput').classList.add('hidden-section');
        } else {
            document.getElementById('manualInput').classList.add('hidden-section');
            document.getElementById('photoInput').classList.remove('hidden-section');
        }
    }

    // إرسال بيانات التسجيل إلى Google Apps Script
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        const data = {
            name: document.getElementById('resName').value,
            area: document.getElementById('resArea').value,
            phone: document.getElementById('resPhone').value,
            comm: document.getElementById('commission').value,
            pay: document.getElementById('paySystem').value,
            lat: document.getElementById('lat').value,
            lng: document.getElementById('lng').value,
            type: 'RESTAURANT_REG'
        };

        google.script.run.withSuccessHandler(() => {
            alert('تم إرسال طلبك بنجاح. بانتظار موافقة المدير.');
        }).processData(data);
    };

    // إرسال الطلبية
    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        // هنا يتم جمع بيانات الطلبية وإرسالها للنظام التلقائي
        // سيقوم نظام Apps Script بالبحث عن أقرب سائق
        const orderData = {
            customerArea: document.getElementById('customerArea').value,
            customerPhone: document.getElementById('customerPhone').value,
            // معالجة الصورة إذا وجدت وتحويلها لـ Base64
            type: 'NEW_ORDER'
        };
        
        document.getElementById('statusMsg').innerText = "جاري البحث عن أقرب سائق...";
        google.script.run.withSuccessHandler(res => {
            document.getElementById('statusMsg').innerText = "تم استلام الطلب وبانتظار قبول السائق.";
        }).handleOrder(orderData);
    };
</script>

</body>
</html>
