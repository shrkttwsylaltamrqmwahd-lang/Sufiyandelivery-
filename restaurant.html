<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطاعم | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #0f172a; /* كحلي غامق جداً */
            --accent: #f97316;  /* برتقالي حيوي */
            --glass: rgba(255, 255, 255, 0.95);
            --bg: #f8fafc;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Cairo', sans-serif; 
            color: var(--primary);
            overflow-x: hidden;
        }

        /* Loading Overlay Customization */
        #loadingOverlay {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            z-index:9999; display:none; align-items:center; justify-content:center; flex-direction: column;
            color: white;
        }

        .container { max-width: 600px; padding-bottom: 50px; }

        /* Header Design */
        .header-brand {
            padding: 40px 0 20px;
            text-align: center;
        }
        .header-brand h2 { font-weight: 800; letter-spacing: -1px; color: var(--primary); }
        .header-brand span { color: var(--accent); }

        /* Card Modernization */
        .card {
            border: none;
            border-radius: 24px;
            background: var(--glass);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .card-title { font-weight: 700; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }

        /* Form Inputs */
        .form-control, .form-select {
            border-radius: 14px;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            background: #fff;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        /* Maps Styling */
        #map { 
            height: 250px; width: 100%; border-radius: 20px; 
            margin-top: 10px; border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        /* Buttons */
        .btn-main {
            background: var(--primary);
            color: white;
            border-radius: 16px;
            padding: 15px;
            font-weight: 700;
            border: none;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-main:hover { background: #1e293b; transform: translateY(-2px); color: white; }

        .btn-group .btn {
            border-radius: 12px !important;
            margin: 0 5px;
            border: 2px solid #e2e8f0 !important;
            font-weight: 600;
        }
        .btn-group .btn.active { background-color: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }

        .hidden-section { display: none; opacity: 0; transform: translateY(10px); }
        .show-section { display: block; opacity: 1; transform: translateY(0); transition: 0.5s; }

        .status-badge {
            background: #f0fdf4; color: #166534; padding: 10px; border-radius: 12px; font-weight: 600;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-grow text-warning" role="status"></div>
    <span class="mt-3 fw-bold">جاري الاتصال بنظام الحوت...</span>
</div>

<div class="container">
    <div class="header-brand">
        <i data-lucide="waves" size="48" color="#f97316"></i>
        <h2 class="mt-2">نظام <span>الحوت</span></h2>
        <p class="text-muted">بوابة الشركاء والمطاعم</p>
    </div>

    <div id="loginCheckSection" class="card p-4">
        <div class="card-title"><i data-lucide="log-in" color="#f97316"></i> دخول المطعم</div>
        <div class="mb-3">
            <input type="tel" id="checkPhone" class="form-control" placeholder="رقم الهاتف المسجل (مثلاً 077...)">
        </div>
        <button class="btn btn-main w-100" onclick="checkRestaurantStatus()">
            دخول للوحة التحكم <i data-lucide="arrow-left"></i>
        </button>
    </div>

    <div id="registrationSection" class="card p-4">
        <div class="card-title"><i data-lucide="store" color="#f97316"></i> تسجيل شريك جديد</div>
        <form id="regForm">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label small fw-bold">اسم المطعم التجاري</label>
                    <input type="text" id="resName" class="form-control" placeholder="مثلاً: مطعم مأكولات المدينة">
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">المنطقة</label>
                    <select id="resArea" class="form-select">
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        <option value="تسعين">تسعين</option>
                        <option value="عرفات">عرفات</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">رقم الهاتف</label>
                    <input type="tel" id="resPhone" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label small fw-bold">حدد موقعك على الخريطة</label>
                    <div id="map"></div>
                    <input type="hidden" id="lat" value="35.468">
                    <input type="hidden" id="lng" value="44.392">
                </div>
                <button type="submit" class="btn btn-main w-100 mt-3">إرسال طلب الانضمام</button>
            </div>
        </form>
    </div>

    <div id="orderSection" class="card p-4 hidden-section">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="card-title m-0"><i data-lucide="shopping-bag" color="#f97316"></i> إرسال طلبية</div>
            <span class="status-badge" id="activeResName"></span>
        </div>
        
        <div class="btn-group w-100 mb-4">
            <button class="btn btn-outline-secondary active" id="btnManual" onclick="switchMethod('manual')">إدخال يدوي</button>
            <button class="btn btn-outline-secondary" id="btnPhoto" onclick="switchMethod('photo')">تصوير وصل</button>
        </div>

        <form id="orderForm">
            <div id="manualInput">
                <div class="mb-3">
                    <label class="form-label small fw-bold">عنوان الزبون (المنطقة)</label>
                    <select id="customerArea" class="form-select">
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        <option value="تسعين">تسعين</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">رقم هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="form-control" placeholder="07XXXXXXXXX">
                </div>
            </div>

            <div id="photoInput" class="hidden-section mb-4 text-center">
                <div class="p-4 border-2 border-dashed rounded-4 mb-2" style="border: 2px dashed #cbd5e1;">
                    <i data-lucide="camera" size="32" class="text-muted mb-2"></i>
                    <input type="file" id="orderImg" class="form-control" accept="image/*" capture="camera">
                </div>
            </div>

            <button type="submit" class="btn btn-main w-100">
                <i data-lucide="navigation"></i> البحث عن أقرب سائق
            </button>
        </form>
        <div id="statusMsg" class="mt-4 text-center"></div>
    </div>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
<script>
    // تهيئة الأيقونات
    lucide.createIcons();

    const API_URL = "https://script.google.com/macros/s/AKfycby7a-gZ44EKeTLJWHnayDvUhiWwKnX8eKZp8BudmWf7xaLLTVBnAdOSgtVa3DTJe9lUJA/exec";
    let map, marker;
    let currentRestaurant = null;

    function initMap() {
        const defaultLoc = { lat: 35.468, lng: 44.392 }; 
        map = new google.maps.Map(document.getElementById("map"), { 
            zoom: 14, 
            center: defaultLoc,
            styles: [/* إمكانية إضافة ستايل فضي هنا */]
        });
        marker = new google.maps.Marker({ position: defaultLoc, map: map, draggable: true });
        
        marker.addListener('dragend', () => {
            document.getElementById('lat').value = marker.getPosition().lat();
            document.getElementById('lng').value = marker.getPosition().lng();
        });
    }

    function switchMethod(method) {
        document.getElementById('manualInput').classList.toggle('hidden-section', method === 'photo');
        document.getElementById('photoInput').classList.toggle('hidden-section', method === 'manual');
        document.getElementById('btnManual').classList.toggle('active', method === 'manual');
        document.getElementById('btnPhoto').classList.toggle('active', method === 'photo');
    }

    function checkRestaurantStatus() {
        const phone = document.getElementById('checkPhone').value;
        if(!phone) return;
        
        showLoading(true);
        fetch(`${API_URL}?action=checkRes&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
            showLoading(false);
            if(data.status === "active") {
                currentRestaurant = data;
                document.getElementById('registrationSection').style.display = 'none';
                document.getElementById('loginCheckSection').style.display = 'none';
                document.getElementById('orderSection').classList.add('show-section');
                document.getElementById('activeResName').innerText = data.name;
            } else {
                alert("المطعم غير مسجل أو بانتظار التفعيل");
            }
        });
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
    
    // باقي دوال الإرسال (POST) تبقى كما هي للربط مع الشيت...
</script>
</body>
</html>
