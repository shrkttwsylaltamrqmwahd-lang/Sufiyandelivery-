<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال طلب | الحوت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 p-4 text-white font-['Tajawal']">
    <div class="max-w-md mx-auto space-y-6">
        <header class="bg-slate-900 p-4 rounded-2xl border-b-2 border-emerald-500 flex justify-between items-center">
            <span id="resName" class="font-black italic">...</span>
            <div class="text-[10px] bg-emerald-500 text-black px-2 py-1 rounded-full font-bold">KIRKUK V10</div>
        </header>

        <form id="orderForm" class="bg-slate-900 p-6 rounded-[2rem] space-y-5 shadow-2xl">
            <select id="area" class="w-full p-4 bg-slate-800 rounded-xl font-bold outline-none border-2 border-transparent focus:border-emerald-500" required>
                <option value="" disabled selected>اختر منطقة التوصيل</option>
                <option value="الماس">الماس</option><option value="طريق بغداد">طريق بغداد</option>
                <option value="التسعين">التسعين</option><option value="الواسطي">الواسطي</option>
            </select>
            <input type="tel" id="custPhone" placeholder="هاتف الزبون" class="w-full p-4 bg-slate-800 rounded-xl font-bold outline-none">
            <textarea id="details" placeholder="التفاصيل أو العنوان الدقيق" class="w-full p-4 bg-slate-800 rounded-xl h-24 font-bold"></textarea>
            
            <div class="border-2 border-dashed border-slate-700 p-4 rounded-xl text-center">
                <input type="file" id="imgInput" accept="image/*" capture="camera" class="hidden" onchange="preview(event)">
                <button type="button" onclick="document.getElementById('imgInput').click()" class="text-emerald-400 font-bold text-sm"><i class="fas fa-camera"></i> تصوير الوصل</button>
                <img id="imgPreview" class="mt-2 hidden max-h-32 mx-auto rounded-lg">
            </div>

            <button type="submit" id="sendBtn" class="w-full bg-emerald-500 py-5 rounded-2xl text-black font-black text-xl shadow-lg shadow-emerald-500/10">بث الطلب 🐋</button>
        </form>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec";
        let resData = null; let base64 = null;

        window.onload = async () => {
            const phone = localStorage.getItem('whale_res_phone');
            const data = await (await fetch(`${API}?action=get_master_data&pass=112233`)).json();
            resData = data.restaurants.find(r => String(r[2]) === String(phone));
            document.getElementById('resName').innerText = resData[1];
        };

        function preview(e) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('imgPreview').src = reader.result;
                document.getElementById('imgPreview').classList.remove('hidden');
                base64 = reader.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sendBtn');
            btn.innerText = "جاري البحث عن أقرب طيار..."; btn.disabled = true;

            const payload = {
                action: "restaurant_send_order",
                restName: resData[1],
                restLocation: resData[3],
                fee: resData[5],
                lat: resData[6],
                lng: resData[7],
                area: document.getElementById('area').value,
                details: "هاتف: " + document.getElementById('custPhone').value + " | " + document.getElementById('details').value,
                image: base64
            };

            await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            alert("تم إطلاق الطلب بنجاح!"); location.reload();
        };
    </script>
</body>
</html>
