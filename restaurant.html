<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المطعم | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; }
        .tab-btn.active { background-color: #0f172a; color: white; box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3); }
        .hidden-input { display: none; }
        .btn-glow { box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2); }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-10 pb-20">

    <header class="max-w-xl mx-auto mb-6 flex justify-between items-center glass-header p-5 rounded-[2rem] border border-white shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-emerald-500 font-black">ح</div>
            <div>
                <p class="text-[9px] text-gray-400 font-black uppercase italic">مرحباً بك في المنظومة</p>
                <h1 id="displayResName" class="text-sm font-black text-slate-900 italic tracking-tight">جاري التحميل...</h1>
            </div>
        </div>
        <button onclick="logout()" class="text-[9px] font-black text-red-500 border border-red-100 px-3 py-2 rounded-xl hover:bg-red-50 transition-colors">خروج</button>
    </header>

    <div class="max-w-xl mx-auto bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl border border-slate-100 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-black text-slate-900 italic">بث طلبية جديدة 🚀</h2>
            <p class="text-[10px] text-emerald-600 mt-2 font-bold uppercase tracking-widest italic">رادار الحوت - كركوك</p>
        </div>

        <div class="flex gap-2 mb-8 bg-slate-100 p-1.5 rounded-2xl">
            <button onclick="switchTab('manual')" id="manualBtn" class="tab-btn active flex-1 py-4 rounded-xl font-black text-xs transition-all italic">بيانات يدوية ✍️</button>
            <button onclick="switchTab('camera')" id="cameraBtn" class="tab-btn flex-1 py-4 rounded-xl font-black text-xs transition-all text-slate-500 italic">تصوير وصل 📸</button>
        </div>
        
        <form id="orderForm" class="space-y-8">
            <div>
                <label class="text-[11px] font-black text-slate-500 uppercase mb-3 mr-2 block italic">💰 سعر الوجبات (يدفعه السائق للمطعم)</label>
                <input type="number" id="foodPrice" placeholder="مثلاً: 15000" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold text-lg" required>
            </div>

            <div id="manualSection" class="space-y-6">
                <div>
                    <label class="text-[11px] font-black text-slate-500 uppercase mb-3 mr-2 block italic">📍 وجهة التوصيل</label>
                    <input type="text" id="details" placeholder="المنطقة أو معلم دال..." class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-bold">
                </div>

                <div>
                    <label class="text-[11px] font-black text-slate-500 uppercase mb-3 mr-2 block italic">📞 هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-emerald-500 font-mono tracking-widest" placeholder="07XXXXXXXXX">
                </div>
            </div>

            <div id="cameraSection" class="hidden-input space-y-4 text-center">
                <div onclick="document.getElementById('receiptImage').click()" class="border-4 border-dashed border-slate-200 rounded-[2.5rem] p-12 cursor-pointer hover:bg-slate-50 hover:border-emerald-300 transition-all group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">📸</div>
                    <p class="font-black text-slate-700 italic">اضغط لفتح الكاميرا</p>
                    <input type="file" id="receiptImage" accept="image/*" capture="camera" class="hidden" onchange="previewImage(event)">
                </div>
                
                <div id="previewContainer" class="hidden p-4 bg-emerald-50 rounded-3xl border border-emerald-100">
                    <img id="imagePreview" src="#" class="mx-auto rounded-2xl max-h-48 shadow-lg border-2 border-white">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-slate-900 py-6 rounded-[2.5rem] font-black text-xl hover:bg-emerald-400 transition-all active:scale-95 btn-glow flex items-center justify-center gap-3 italic uppercase">
                بث الآن للرادار 🚀
            </button>
        </form>
    </div>

    <script>
        // الرابط الخاص بك يا طه
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyYL0NRSg1V9xL62JyL5MQfP2jNO3sNU6lDl1xf_GcmOAZXWBg8G7YpdFdJjxpEDcpDhQ/exec';
        let currentMode = 'manual';
        let base64Image = null;

        document.addEventListener('DOMContentLoaded', () => {
            const resName = localStorage.getItem('whale_res_name') || "مجهول";
            document.getElementById('displayResName').innerText = resName;
        });

        function switchTab(type) {
            currentMode = type;
            document.getElementById('manualSection').classList.toggle('hidden-input', type !== 'manual');
            document.getElementById('cameraSection').classList.toggle('hidden-input', type !== 'camera');
            document.getElementById('manualBtn').classList.toggle('active', type === 'manual');
            document.getElementById('cameraBtn').classList.toggle('active', type === 'camera');
            
            // جعل الحقول غير مطلوبة إذا كنا في وضع الكاميرا
            document.getElementById('details').required = (type === 'manual');
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    base64Image = e.target.result.split(',')[1];
                }
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('orderForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resName = localStorage.getItem('whale_res_name');

            if (!resName) return alert("خطأ في بيانات المطعم، يرجى إعادة تسجيل الدخول");

            btn.disabled = true;
            btn.innerText = "جاري البث... 📡";

            const orderData = {
                action: 'restaurant_send_order', // إضافة الأكشن للتأكيد
                restName: resName,
                type: currentMode === 'camera' ? 'photo' : 'manual',
                details: document.getElementById('details').value + " | المطلوب للمطعم: " + document.getElementById('foodPrice').value + " دينار",
                customerPhone: document.getElementById('customerPhone').value,
                image: base64Image,
                fixedFee: 1000 // عمولة المنظومة
            };

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                
                if(result.status === "success") {
                    alert("تم البث بنجاح! رقم الطلب: " + result.orderID);
                    location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                alert("فشل البث: " + err.message);
                btn.disabled = false;
                btn.innerText = "بث الآن للرادار 🚀";
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'restaurant_login.html';
        }
    </script>
</body>
</html>
