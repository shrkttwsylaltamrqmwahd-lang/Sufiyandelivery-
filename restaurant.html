<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة المطعم | نظام الحوت للتوصيل</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .container { max-width: 800px; margin-top: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-brand { color: #2c3e50; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .hidden-section { display: none; }
        #map { height: 300px; width: 100%; border-radius: 10px; margin-top: 10px; }
        .btn-primary { background-color: #3498db; border: none; }
        .btn-success { background-color: #27ae60; border: none; }
        #loadingOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; display:flex; align-items:center; justify-content:center; display:none; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-primary" role="status"></div>
    <span class="ms-2">جاري المعالجة...</span>
</div>

<div class="container">
    <div class="header-brand">
        <h2>سفيان لتوصيل الطعام - بوابة المطاعم</h2>
    </div>

    <div id="loginCheckSection" class="card p-4 mb-4">
        <h4>تسجيل الدخول</h4>
        <div class="input-group mt-3">
            <input type="tel" id="checkPhone" class="form-control" placeholder="أدخل رقم هاتف المطعم المسجل">
            <button class="btn btn-primary" onclick="checkRestaurantStatus()">دخول</button>
        </div>
        <p class="mt-3 small text-muted">إذا كنت مطعماً جديداً، املأ النموذج أدناه.</p>
    </div>

    <div id="registrationSection" class="card p-4">
        <h4 class="mb-3">تسجيل مطعم جديد</h4>
        <form id="regForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">اسم المطعم</label>
                    <input type="text" id="resName" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">منطقة المطعم</label>
                    <select id="resArea" class="form-select" required>
                        <option value="">اختر المنطقة...</option>
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        <option value="عرفات">عرفات</option>
                        <option value="تسعين">تسعين</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" id="resPhone" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">العمولة الثابتة (IQD)</label>
                    <input type="number" id="commission" class="form-control" value="500" required>
                </div>
                <div class="col-md-12">
                    <label class="form-label">نظام دفع العمولة</label>
                    <select id="paySystem" class="form-select" required>
                        <option value="المطعم يدفع">على المطعم بالكامل</option>
                        <option value="مناصفة">مناصفة مع السائق</option>
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label">حدد موقعك الدقيق</label>
                    <div id="map"></div>
                    <input type="hidden" id="lat" value="35.468">
                    <input type="hidden" id="lng" value="44.392">
                </div>
                <button type="submit" class="btn btn-primary mt-4 p-3">إرسال طلب الانضمام</button>
            </div>
        </form>
    </div>

    <div id="orderSection" class="card p-4 hidden-section">
        <h4 class="mb-3 text-success">إرسال طلبية جديدة - <span id="activeResName"></span></h4>
        <div class="mb-4">
            <label class="form-label">طريقة الإدخال</label>
            <div class="btn-group w-100">
                <button type="button" class="btn btn-outline-secondary active" id="btnManual" onclick="switchMethod('manual')">إدخال يدوي</button>
                <button type="button" class="btn btn-outline-secondary" id="btnPhoto" onclick="switchMethod('photo')">صورة الوصل</button>
            </div>
        </div>

        <form id="orderForm">
            <div id="manualInput">
                <div class="mb-3">
                    <label class="form-label">منطقة الزبون</label>
                    <select id="customerArea" class="form-select">
                        <option value="المنطقة المركزية">المنطقة المركزية</option>
                        <option value="حي النصر">حي النصر</option>
                        <option value="تسعين">تسعين</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">رقم هاتف الزبون</label>
                    <input type="tel" id="customerPhone" class="form-control" placeholder="07XXXXXXXXX">
                </div>
            </div>

            <div id="photoInput" class="hidden-section mb-3">
                <label class="form-label">التقاط سريع للوصل</label>
                <input type="file" id="orderImg" class="form-control" accept="image/*" capture="camera">
            </div>

            <button type="submit" class="btn btn-success w-100 p-3">إرسال الطلب للنظام</button>
        </form>
        <div id="statusMsg" class="mt-3 text-center fw-bold"></div>
    </div>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7a-gZ44EKeTLJWHnayDvUhiWwKnX8eKZp8BudmWf7xaLLTVBnAdOSgtVa3DTJe9lUJA/exec";
    let map, marker;
    let currentRestaurant = null;

    function initMap() {
        const defaultLoc = { lat: 35.468, lng: 44.392 }; 
        map = new google.maps.Map(document.getElementById("map"), { zoom: 14, center: defaultLoc });
        marker = new google.maps.Marker({ position: defaultLoc, map: map, draggable: true });

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setCenter(myLoc);
                marker.setPosition(myLoc);
                updateCoords(myLoc.lat, myLoc.lng);
            });
        }
        marker.addListener('dragend', () => {
            updateCoords(marker.getPosition().lat(), marker.getPosition().lng());
        });
    }

    function updateCoords(lat, lng) {
        document.getElementById('lat').value = lat;
        document.getElementById('lng').value = lng;
    }

    function switchMethod(method) {
        document.getElementById('manualInput').classList.toggle('hidden-section', method === 'photo');
        document.getElementById('photoInput').classList.toggle('hidden-section', method === 'manual');
        document.getElementById('btnManual').classList.toggle('active', method === 'manual');
        document.getElementById('btnPhoto').classList.toggle('active', method === 'photo');
    }

    // التحقق من حالة المطعم قبل البدء
    function checkRestaurantStatus() {
        const phone = document.getElementById('checkPhone').value;
        if(!phone) return alert("يرجى إدخال رقم الهاتف");
        
        showLoading(true);
        fetch(`${API_URL}?action=checkRes&phone=${phone}`)
        .then(res => res.json())
        .then(data => {
            showLoading(false);
            if(data.status === "active") {
                currentRestaurant = data;
                document.getElementById('registrationSection').classList.add('hidden-section');
                document.getElementById('loginCheckSection').classList.add('hidden-section');
                document.getElementById('orderSection').classList.remove('hidden-section');
                document.getElementById('activeResName').innerText = data.name;
            } else if(data.status === "pending") {
                alert("حسابك قيد المراجعة من قبل المدير.");
            } else {
                alert("المطعم غير مسجل. يرجى ملء نموذج التسجيل.");
            }
        });
    }

    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        showLoading(true);
        const data = {
            name: document.getElementById('resName').value,
            area: document.getElementById('resArea').value,
            phone: document.getElementById('resPhone').value,
            comm: document.getElementById('commission').value,
            pay: document.getElementById('paySystem').value,
            lat: document.getElementById('lat').value,
            lng: document.getElementById('lng').value,
            action: 'RESTAURANT_REG'
        };

        fetch(API_URL, { method: 'POST', body: JSON.stringify(data) })
        .then(() => {
            showLoading(false);
            alert('تم إرسال طلبك بنجاح. بانتظار موافقة المدير.');
        });
    };

    document.getElementById('orderForm').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('statusMsg').innerText = "جاري البحث عن أقرب سائق متاح...";
        
        const orderData = {
            restaurantName: currentRestaurant.name,
            area: document.getElementById('customerArea').value,
            phone: document.getElementById('customerPhone').value,
            action: 'NEW_ORDER'
        };

        fetch(API_URL, { method: 'POST', body: JSON.stringify(orderData) })
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                document.getElementById('statusMsg').innerHTML = `<span class="text-success">تم العثور على سائق (${res.driverName})! الطلب قيد التنفيذ.</span>`;
            } else {
                document.getElementById('statusMsg').innerHTML = `<span class="text-danger">${res.msg}</span>`;
            }
        });
    };

    function showLoading(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
</script>
</body>
</html>
