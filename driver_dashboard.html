<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الكابتن | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .radar-ping { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        .img-zoom { transition: transform 0.3s; width: 100%; height: auto; border-radius: 1rem; cursor: zoom-in; }
        .img-zoom:active { transform: scale(1.8); z-index: 100; position: relative; }
        .hidden { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    
    <header class="p-5 bg-slate-900 rounded-b-[2.5rem] border-b border-emerald-500/30 shadow-2xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="relative"><div class="absolute inset-0 bg-emerald-500 rounded-full radar-ping opacity-20"></div><div class="w-3 h-3 bg-emerald-500 rounded-full relative z-10"></div></div>
            <div>
                <h1 class="text-[10px] font-black text-emerald-500 italic uppercase tracking-tighter">Whale Pilot Radar</h1>
                <p id="welcomeName" class="text-xs text-white font-bold italic text-right tracking-wide">جاري الاتصال...</p>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] bg-red-500/10 text-red-400 px-4 py-2 rounded-xl font-black italic border border-red-500/20 active:scale-90 transition-all">خروج</button>
    </header>

    <main class="p-6">
        <div id="searchingStatus" class="text-center mb-8">
            <p id="radarText" class="text-[9px] text-emerald-500 font-black uppercase tracking-[0.4em] italic animate-pulse">Scanning Kirkuk Sector...</p>
        </div>

        <div id="ordersContainer" class="space-y-6">
            </div>

        <div id="noOrders" class="text-center py-32 opacity-20 italic">
            <i class="fas fa-satellite-dish text-6xl mb-4 text-slate-700"></i>
            <p class="text-xs font-black uppercase tracking-[0.3em]">الرادار يبحث عن إشارات في كركوك</p>
        </div>
    </main>

    <script>
        // رابط السكريبت V6.0 (The Octopus Update)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyLS5rwRjqIG8_s0XTuYT1ai1_PewDOBejcEUDCa_EwCqY3p9i5RiHdet9gsgpr6QA_kg/exec';
        const driverPhone = localStorage.getItem('whale_driver_phone'); 

        document.addEventListener('DOMContentLoaded', () => {
            if (!driverPhone) { window.location.href = 'driver_login.html'; return; }
            document.getElementById('welcomeName').innerText = "كابتن: " + (localStorage.getItem('whale_driver_name') || "مجهول");
            
            // 1. تفعيل الرادار (متوافق مع update_driver_live في السكريبت)
            initRadar();
            
            // 2. فحص الطلبات (متوافق مع get_radar_orders في السكريبت)
            fetchOrders();
            setInterval(fetchOrders, 7000); 
        });

        // إرسال الإحداثيات للعمود 6 و 7 في شيت Drivers
        function initRadar() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    sendLocation(pos.coords.latitude, pos.coords.longitude);
                    setInterval(() => {
                        navigator.geolocation.getCurrentPosition(p => sendLocation(p.coords.latitude, p.coords.longitude));
                    }, 30000); // تحديث كل 30 ثانية
                }, (err) => alert("يرجى تفعيل الموقع لتظهر في الرادار."), { enableHighAccuracy: true });
            }
        }

        async function sendLocation(lat, lng) {
            const data = { 
                action: "update_driver_live", // التسمية المطلوبة في السكريبت V6.0
                phone: driverPhone, 
                lat: lat, 
                lng: lng 
            };
            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        }

        async function fetchOrders() {
            try {
                // طلب الأكشن get_radar_orders كما هو محدد في السكريبت
                const res = await fetch(`${scriptURL}?action=get_radar_orders&phone=${driverPhone}`);
                const data = await res.json();
                
                const container = document.getElementById('ordersContainer');
                const noOrders = document.getElementById('noOrders');
                
                if (data.orders && data.orders.length > 0) {
                    noOrders.classList.add('hidden');
                    container.innerHTML = "";
                    data.orders.forEach(order => {
                        container.innerHTML += createOrderCard(order);
                    });
                    updateRadarUI(true);
                } else {
                    container.innerHTML = "";
                    noOrders.classList.remove('hidden');
                    updateRadarUI(false);
                }
            } catch (e) { console.log("Radar Sync..."); }
        }

        function createOrderCard(order) {
            // ترتيب البيانات في السكريبت: [ID, المطعم, النوع, التفاصيل, الصورة, الحالة...]
            const orderID = order[0];
            const restName = order[1];
            const details = order[3];
            const img = order[4];
            const phoneMatch = details.match(/07[0-9]{9}/);
            const customerPhone = phoneMatch ? phoneMatch[0] : null;

            return `
                <div class="receipt-card p-6 rounded-[2.5rem] border-t-4 border-amber-500">
                    <div class="mb-4 text-center border-b border-white/5 pb-4">
                        <span class="text-[8px] bg-amber-500 text-black px-3 py-0.5 rounded-full font-black italic">مهمة متاحة</span>
                        <h2 class="text-xl font-black text-white italic mt-2">${restName}</h2>
                    </div>
                    ${img ? `<div class="mb-4"><img src="${img}" class="img-zoom rounded-xl"></div>` : ''}
                    <div class="bg-white/5 p-4 rounded-2xl text-xs italic text-right mb-4">
                        <p class="text-gray-500 mb-1">📍 التفاصيل:</p>
                        <p>${details}</p>
                    </div>
                    ${customerPhone ? `
                        <a href="tel:${customerPhone}" class="flex items-center justify-between bg-blue-600/20 p-4 rounded-2xl border border-blue-500/30 mb-4">
                            <span class="font-mono text-blue-400">${customerPhone}</span>
                            <i class="fas fa-phone-alt text-blue-400"></i>
                        </a>
                    ` : ''}
                    <button onclick="acceptOrder('${orderID}')" class="w-full bg-emerald-500 text-black py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-all italic">
                        قبول المهمة 🐋
                    </button>
                </div>
            `;
        }

        async function acceptOrder(id) {
            // استخدام عمل المدير Master Control لتغيير حالة الطلب وتعيين السائق
            // في السكريبت: الحالة في العمود 6 (Index 6) والسائق في العمود 7 (Index 7)
            const payloadStatus = { 
                action: "master_control", 
                pass: "112233", // الباسورد الافتراضي في سكريبت V6.0
                targetSheet: "Orders", 
                targetID: id, 
                colIndex: 6, // تحديث الحالة إلى accepted
                newValue: "accepted" 
            };
            
            const payloadDriver = { 
                action: "master_control", 
                pass: "112233", 
                targetSheet: "Orders", 
                targetID: id, 
                colIndex: 7, // وضع هاتف السائق
                newValue: driverPhone 
            };

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadStatus) });
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadDriver) });
            
            alert("تم قبول الطلب! توجه للمطعم 🚀");
            fetchOrders();
        }

        function updateRadarUI(active) {
            const txt = document.getElementById('radarText');
            txt.innerText = active ? "LOCKED ON MISSION 🐋" : "Scanning Kirkuk Sector...";
            txt.style.color = active ? "#fbbf24" : "#10b981";
        }

        function logout() { localStorage.clear(); window.location.href = 'driver_login.html'; }
    </script>
</body>
</html>
