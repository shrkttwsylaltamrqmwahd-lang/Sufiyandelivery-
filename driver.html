<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة السائق | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #eceff1; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .status-badge { font-size: 0.9rem; padding: 5px 15px; border-radius: 20px; }
        .timer-circle { width: 80px; height: 80px; border: 5px solid #e74c3c; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; margin: 10px auto; color: #e74c3c; }
        #orderAlert { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; color: white; padding: 20px; text-align: center; }
        .hidden-section { display: none; }
        #driverMap { height: 200px; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div id="driverRegSection" class="card p-4 mb-4">
        <h3 class="text-center mb-4">تسجيل سائق جديد</h3>
        <form id="driverRegForm">
            <div class="mb-3">
                <label class="form-label">الاسم الثلاثي</label>
                <input type="text" id="driverName" class="form-control" placeholder="أدخل اسمك الكامل" required>
            </div>
            <div class="mb-3">
                <label class="form-label">رقم الهاتف</label>
                <input type="tel" id="driverPhone" class="form-control" placeholder="07XXXXXXXX" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 p-3">إرسال طلب الانضمام</button>
        </form>
    </div>

    <div id="driverDashboard" class="hidden-section">
        <div class="card p-3 mb-3 text-center">
            <h5 id="welcomeMsg">مرحباً، جاري التحميل...</h5>
            <div class="d-flex justify-content-around mt-3">
                <div>
                    <small class="text-muted d-block">طلبات اليوم</small>
                    <b id="dailyOrders">0</b>
                </div>
                <div>
                    <small class="text-muted d-block">مدة الانتظار</small>
                    <b id="waitTime">0 دقيقة</b>
                </div>
            </div>
        </div>

        <div id="driverMap"></div>

        <div class="card p-3 text-center">
            <span id="onlineStatus" class="status-badge bg-success text-white mb-3">أنت متصل الآن وبانتظار طلبات</span>
            <button class="btn btn-outline-danger btn-sm" onclick="toggleStatus()">إيقاف الاستقبال مؤقتاً</button>
        </div>
    </div>
</div>

<div id="orderAlert">
    <h2 class="mt-5">طلب جديد متاح!</h2>
    <div class="timer-circle" id="timer">60</div>
    <div class="card bg-dark border-secondary p-3 mt-4 text-white text-end">
        <p><strong>المطعم:</strong> <span id="alertResName">...</span></p>
        <p><strong>المنطقة:</strong> <span id="alertArea">...</span></p>
        <p><strong>المسافة إليك:</strong> <span id="alertDist">...</span></p>
    </div>
    <div class="d-flex gap-3 mt-5">
        <button class="btn btn-success btn-lg flex-grow-1 p-3" onclick="acceptOrder()">قبول الطلب</button>
        <button class="btn btn-danger btn-lg flex-grow-1 p-3" onclick="rejectOrder()">رفض</button>
    </div>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
<script>
    let driverPos = { lat: 0, lng: 0 };
    let waitSeconds = 0;
    let countdownInterval;

    // 1. تتبع الموقع اللحظي
    function trackLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                driverPos.lat = pos.coords.latitude;
                driverPos.lng = pos.coords.longitude;
                updateSystem(); // إرسال الموقع للنظام
            }, err => console.error(err), { enableHighAccuracy: true });
        }
    }

    // 2. تحديث بيانات السائق في Google Sheets لحظياً
    function updateSystem() {
        const data = {
            lat: driverPos.lat,
            lng: driverPos.lng,
            waitTime: Math.floor(waitSeconds / 60),
            status: 'online',
            type: 'DRIVER_UPDATE'
        };
        // استدعاء Apps Script بصمت
        if (typeof google !== 'undefined') {
            google.script.run.syncDriverData(data);
        }
    }

    // 3. عداد وقت الانتظار
    setInterval(() => {
        waitSeconds++;
        document.getElementById('waitTime').innerText = Math.floor(waitSeconds / 60) + " دقيقة";
    }, 1000);

    // 4. محاكاة استقبال طلب (يتم استدعاؤها من Apps Script)
    function showNewOrder(orderInfo) {
        document.getElementById('alertResName').innerText = orderInfo.resName;
        document.getElementById('alertArea').innerText = orderInfo.customerArea;
        document.getElementById('alertDist').innerText = orderInfo.distance + " كم";
        
        document.getElementById('orderAlert').style.display = 'block';
        let timeLeft = 60;
        
        countdownInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                rejectOrder();
            }
        }, 1000);
    }

    function acceptOrder() {
        clearInterval(countdownInterval);
        document.getElementById('orderAlert').style.display = 'none';
        // إرسال تأكيد القبول للـ Apps Script
        google.script.run.withSuccessHandler(res => {
            alert('تم قبول الطلب، توجه للمطعم الآن');
        }).driverAccepts(true);
    }

    function rejectOrder() {
        clearInterval(countdownInterval);
        document.getElementById('orderAlert').style.display = 'none';
        google.script.run.driverAccepts(false);
    }

    // التسجيل لأول مرة
    document.getElementById('driverRegForm').onsubmit = function(e) {
        e.preventDefault();
        const driverData = {
            name: document.getElementById('driverName').value,
            phone: document.getElementById('driverPhone').value,
            type: 'DRIVER_REG'
        };
        google.script.run.withSuccessHandler(() => {
            alert('تم إرسال طلبك للمدير للمراجعة.');
        }).processData(driverData);
    };

    window.onload = trackLocation;
</script>

</body>
</html>
