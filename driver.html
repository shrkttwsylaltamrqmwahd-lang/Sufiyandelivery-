<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كابتن الحوت | Al-Hut Captain</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            background: #f1f5f9; 
            font-family: 'Cairo', sans-serif; 
            overflow-x: hidden; 
            user-select: none;
            color: var(--primary-dark);
        }

        .hidden { display: none !important; }

        /* شاشة التنبيه (New Order Alert) */
        #orderAlertOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            z-index: 10000; color: white; display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px 20px;
            animation: pulseBg 2s infinite;
        }
        @keyframes pulseBg { 0% { background: #0f172a; } 50% { background: #1e1b4b; } 100% { background: #0f172a; } }

        /* دائرة العداد */
        .timer-container {
            position: relative; width: 160px; height: 160px; margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
        }
        .timer-svg { transform: rotate(-90deg); width: 160px; height: 160px; }
        .timer-circle {
            fill: none; stroke: var(--accent-orange); stroke-width: 8;
            stroke-dasharray: 440; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear;
        }
        .timer-text { position: absolute; font-size: 3.5rem; font-weight: 900; color: white; }

        /* بطاقة معلومات الكابتن */
        .driver-header {
            background: var(--primary-dark); color: white;
            padding: 30px 20px 60px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.2); color: var(--success-green);
            padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 0.8rem;
        }

        /* الرادار (Radar Animation) */
        .radar-center {
            width: 200px; height: 200px; margin: 40px auto; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .radar-wave {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--success-green); border-radius: 50%;
            animation: radarWave 3s linear infinite; opacity: 0;
        }
        .radar-wave:nth-child(2) { animation-delay: 1s; }
        .radar-wave:nth-child(3) { animation-delay: 2s; }

        @keyframes radarWave {
            0% { transform: scale(0.4); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* الأزرار */
        .btn-big {
            border-radius: 24px; padding: 22px; font-weight: 900; font-size: 1.2rem;
            width: 100%; border: none; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .btn-accept { background: var(--success-green); color: white; box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3); }
        .btn-decline { background: rgba(255,255,255,0.1); color: #94a3b8; margin-top: 15px; }

        .btn-login { background: var(--primary-dark); color: white; border-radius: 20px; padding: 18px; }

        /* الحقول */
        .login-card { background: white; border-radius: 35px; padding: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .phone-input {
            background: #f1f5f9; border: 2px solid transparent; border-radius: 20px;
            padding: 20px; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<audio id="alertSound" loop src="https://actions.google.com/sounds/v1/alarms/beep_loop.ogg"></audio>

<div id="loginPage" class="container py-5">
    <div class="text-center mb-5">
        <div class="d-inline-block p-4 bg-white rounded-circle shadow-sm mb-4">
            <i data-lucide="shield-check" size="50" color="#f97316"></i>
        </div>
        <h1 class="fw-black">نظام الكابتن</h1>
        <p class="text-muted fw-bold text-uppercase small">Al-Hut Logistics System</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="login-card">
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted">رقم الهاتف المسجل</label>
                    <input type="tel" id="driverPhone" class="form-control phone-input text-center" placeholder="07XXXXXXXXX">
                </div>
                <button class="btn btn-big btn-login" onclick="login()">
                    ابدأ العمل الآن <i data-lucide="play"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="dashboardPage" class="hidden">
    <div class="driver-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-black m-0" id="driverNameDisplay">كابتن ...</h4>
                <div class="mt-2"><span class="status-badge"><i data-lucide="radio" size="14" class="me-1"></i> الرادار نشط</span></div>
            </div>
            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="location.reload()">خروج</button>
        </div>
    </div>

    <div class="container" style="margin-top: -30px;">
        <div class="bg-white rounded-4 p-4 shadow-sm border d-flex justify-content-around">
            <div class="text-center">
                <small class="text-muted d-block fw-bold">الطلبات</small>
                <span class="fw-black fs-4">0</span>
            </div>
            <div class="vr opacity-10"></div>
            <div class="text-center">
                <small class="text-muted d-block fw-bold">التقييم</small>
                <span class="fw-black fs-4">5.0</span>
            </div>
        </div>

        <div class="radar-center">
            <div class="radar-wave"></div>
            <div class="radar-wave"></div>
            <div class="radar-wave"></div>
            <div class="bg-success text-white rounded-circle shadow-lg d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; z-index: 10;">
                <i data-lucide="navigation" size="35"></i>
            </div>
        </div>

        <div class="text-center">
            <h4 class="fw-black">جاري البحث عن طلبات...</h4>
            <p class="text-muted small px-5">تأكد من بقاء الشاشة تعمل وعدم قفل الهاتف لاستلام الطلب فوراً</p>
        </div>
    </div>
</div>

<div id="orderAlertOverlay" class="hidden">
    <div class="text-center">
        <div class="bg-warning d-inline-block p-3 rounded-circle mb-3">
            <i data-lucide="bell-ring" color="#000" size="40"></i>
        </div>
        <h2 class="fw-black mb-1">طلب جديد متاح!</h2>
        <p class="opacity-75">قم بقبول الطلب قبل فوات الأوان</p>
    </div>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-circle" cx="80" cy="80" r="70"></circle>
        </svg>
        <div class="timer-text" id="seconds">60</div>
    </div>

    <div class="bg-white rounded-4 p-4 text-dark mx-2 shadow-lg">
        <div class="d-flex align-items-center gap-3 mb-3 border-bottom pb-3">
            <div class="bg-light p-3 rounded-3"><i data-lucide="store" color="#f97316"></i></div>
            <div>
                <small class="text-muted d-block fw-bold">المطعم</small>
                <h4 class="fw-black m-0" id="alertResName">اسم المطعم</h4>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <div class="bg-light p-3 rounded-3"><i data-lucide="map-pin" color="#10b981"></i></div>
            <div>
                <small class="text-muted d-block fw-bold">منطقة العميل</small>
                <h4 class="fw-black m-0 text-primary" id="alertArea">---</h4>
            </div>
        </div>
    </div>

    <div class="px-3">
        <button class="btn-big btn-accept" onclick="acceptOrder()">
            قبووول الطلب <i data-lucide="check-circle" size="30"></i>
        </button>
        <button class="btn-big btn-decline" onclick="declineOrder()">
            تجاهل الطلب
        </button>
    </div>
</div>

<script>
    lucide.createIcons();

    const API_URL = "https://script.google.com/macros/s/AKfycbyj-B2X68zjPMcI7SvAT8r2n1PGG18uVKTBnsWoB82hM55cAfyZ4AIHIhtRr4AHb7b5Qw/exec";
    const API_TOKEN = "HUT_SECURE_99";
    
    let driverData = null;
    let checkInterval, countdownInterval, currentOrderId;

    // الدخول
    function login() {
        const phone = document.getElementById('driverPhone').value.trim();
        if(!phone) return alert("يرجى إدخال رقم الهاتف");

        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkDriver&phone=${phone}&token=${API_TOKEN}&callback=onLogin&ts=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.onLogin = function(data) {
        if(data.status === "active") {
            driverData = data;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('driverNameDisplay').innerText = "كابتن " + data.name;
            startRadar();
        } else {
            alert("⚠️ الحساب غير مفعل أو غير موجود.");
        }
    };

    function startRadar() {
        // فحص الطلبات كل 10 ثواني
        checkInterval = setInterval(checkForOrders, 10000);
        checkForOrders();

        // تفعيل الموقع (GPS)
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                syncLocation(pos.coords.latitude, pos.coords.longitude);
            }, null, { enableHighAccuracy: true });
        }
    }

    function syncLocation(lat, lng) {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=DRIVER_UPDATE&phone=${driverData.phone}&lat=${lat}&lng=${lng}&token=${API_TOKEN}&callback=dummy`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }
    window.dummy = () => {};

    function checkForOrders() {
        // إذا كان التنبيه مفتوحاً بالفعل، لا تطلب مجدداً
        if(!document.getElementById('orderAlertOverlay').classList.contains('hidden')) return;

        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkMyOrders&phone=${driverData.phone}&token=${API_TOKEN}&callback=onNewOrder&ts=${Date.now()}`;
        document.body.appendChild(script);
        script.onload = () => script.remove();
    }

    window.onNewOrder = function(data) {
        if(data.id) {
            currentOrderId = data.id;
            document.getElementById('alertResName').innerText = data.resName;
            document.getElementById('alertArea').innerText = data.customerArea;
            
            // فتح التنبيه
            document.getElementById('orderAlertOverlay').classList.remove('hidden');
            document.getElementById('alertSound').play();
            if(navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
            
            startCountdown(60);
        }
    };

    function startCountdown(sec) {
        let remaining = sec;
        const circle = document.querySelector('.timer-circle');
        
        clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            remaining--;
            document.getElementById('seconds').innerText = remaining;
            
            // تحريك دائرة العداد
            let offset = 440 - (remaining / 60) * 440;
            circle.style.strokeDashoffset = offset;

            if(remaining <= 0) declineOrder();
        }, 1000);
    }

    function acceptOrder() {
        stopAlert();
        // إرسال طلب القبول للسيرفر
        updateStatus('accepted');
    }

    function declineOrder() {
        stopAlert();
        updateStatus('rejected');
    }

    function stopAlert() {
        clearInterval(countdownInterval);
        document.getElementById('orderAlertOverlay').classList.add('hidden');
        document.getElementById('alertSound').pause();
        document.getElementById('alertSound').currentTime = 0;
    }

    function updateStatus(status) {
        const payload = {
            action: 'UPDATE_ORDER_STATUS',
            token: API_TOKEN,
            orderId: currentOrderId,
            status: status
        };

        fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            if(status === 'accepted') alert("✅ تم القبول! توجه للمطعم الآن.");
        });
    }
</script>
</body>
</html>
