<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كابتن الحوت | Al-Hut Captain</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --primary-dark: #0f172a; --accent-orange: #f97316; --success-green: #10b981; }
        body { background: #f1f5f9; font-family: 'Cairo', sans-serif; color: var(--primary-dark); }
        .hidden { display: none !important; }
        
        /* شاشة التنبيه */
        #orderAlertOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            z-index: 10000; color: white; display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px 20px;
        }

        /* واجهة الطلب النشط بعد القبول */
        #activeOrderPage { background: white; min-height: 100vh; position: fixed; top: 0; width: 100%; z-index: 999; padding: 20px; }
        .order-step { border-right: 3px solid #e2e8f0; padding-right: 20px; position: relative; margin-bottom: 30px; }
        .order-step::after { content: ''; position: absolute; right: -8px; top: 0; width: 15px; height: 15px; background: var(--accent-orange); border-radius: 50%; }

        .btn-big { border-radius: 20px; padding: 18px; font-weight: 900; width: 100%; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-success { background: var(--success-green); color: white; }
        .phone-input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 20px; padding: 15px; text-align: center; font-weight: 900; }
    </style>
</head>
<body>

<audio id="alertSound" loop src="https://actions.google.com/sounds/v1/alarms/beep_loop.ogg"></audio>

<div id="loginPage" class="container py-5">
    <div class="text-center mb-5">
        <i data-lucide="truck" size="50" color="#f97316"></i>
        <h2 class="fw-black mt-3">دخول الكباتن</h2>
    </div>
    <div class="bg-white p-4 rounded-4 shadow-sm border">
        <input type="tel" id="driverPhone" class="form-control phone-input mb-4" placeholder="07XXXXXXXXX">
        <button class="btn btn-big btn-dark" onclick="login()">ابدأ العمل</button>
    </div>
</div>

<div id="dashboardPage" class="hidden text-center py-5">
    <div class="p-4 bg-dark text-white rounded-bottom-5 mb-5">
        <h4 id="driverNameDisplay">...</h4>
        <small class="text-success">متصل بالرادار وجاري البحث عن طلبات</small>
    </div>
    <div class="spinner-grow text-success" style="width: 100px; height: 100px;"></div>
</div>

<div id="orderAlertOverlay" class="hidden">
    <div class="text-center">
        <h2 class="fw-black">طلب جديد!</h2>
        <div class="fs-1 fw-black my-4" id="seconds">60</div>
    </div>
    <div class="bg-white rounded-4 p-4 text-dark shadow-lg">
        <p class="mb-1 text-muted">المطعم:</p>
        <h4 id="alertResName" class="fw-black mb-3">...</h4>
        <p class="mb-1 text-muted">منطقة التوصيل:</p>
        <h4 id="alertArea" class="fw-black">...</h4>
    </div>
    <div class="px-2">
        <button class="btn-big btn-success mb-3" onclick="acceptOrder()">قبول الطلب</button>
        <button class="btn btn-link text-white w-100" onclick="declineOrder()">تجاهل</button>
    </div>
</div>

<div id="activeOrderPage" class="hidden">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-black m-0">تفاصيل الطلب</h3>
        <span class="badge bg-warning text-dark p-2">جاري التنفيذ</span>
    </div>

    <div class="order-step">
        <small class="text-muted">المرحلة الأولى: استلام الطلب</small>
        <h5 id="activeResName" class="fw-black">...</h5>
        <a id="resPhoneLink" href="#" class="btn btn-sm btn-outline-primary mt-2">اتصال بالمطعم</a>
    </div>

    <div class="order-step">
        <small class="text-muted">المرحلة الثانية: التوصيل للزبون</small>
        <h5 id="activeCustomerArea" class="fw-black">...</h5>
        <h6 id="activeCustomerPhone" class="fw-bold text-primary mt-2">...</h6>
    </div>

    <div class="fixed-bottom p-3 bg-white border-top">
        <button class="btn-big btn-success" onclick="completeOrder()">تم تسليم الطلب للزبون ✅</button>
    </div>
</div>

<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbwu6JbaHhvoKidHcbZP5HiYisWuBNl07OltajXKSAdEi3JWEDHwadOMybszR2CeP_WPsQ/exec";
    const API_TOKEN = "HUT_SECURE_99";
    let driverData = null, currentOrder = null;

    function login() {
        const phone = document.getElementById('driverPhone').value.trim();
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=onLogin&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.onLogin = function(data) {
        const phone = document.getElementById('driverPhone').value.trim();
        const driver = data.drivers.find(d => d[2] == phone); //
        if(driver && driver[4] === "active") { //
            driverData = { phone: phone, name: driver[1] };
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('driverNameDisplay').innerText = "كابتن " + driverData.name;
            startSystem();
        } else { alert("الحساب غير مفعل"); }
    };

    function startSystem() {
        setInterval(checkForOrders, 10000);
        if(navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const script = document.createElement('script');
                script.src = `${API_URL}?action=DRIVER_UPDATE&phone=${driverData.phone}&lat=${pos.coords.latitude}&lng=${pos.coords.longitude}&token=${API_TOKEN}&callback=dummy`;
                document.body.appendChild(script);
            });
        }
    }

    function checkForOrders() {
        if(!document.getElementById('orderAlertOverlay').classList.contains('hidden') || 
           !document.getElementById('activeOrderPage').classList.contains('hidden')) return;
        
        const script = document.createElement('script');
        script.src = `${API_URL}?action=checkMyOrders&phone=${driverData.phone}&token=${API_TOKEN}&callback=onNewOrder`;
        document.body.appendChild(script);
    }

    window.onNewOrder = function(data) {
        if(data && data.id) {
            currentOrder = data;
            document.getElementById('alertResName').innerText = data.resName;
            document.getElementById('alertArea').innerText = data.customerArea;
            document.getElementById('orderAlertOverlay').classList.remove('hidden');
            document.getElementById('alertSound').play();
        }
    };

    function acceptOrder() {
        // 1. إخفاء التنبيه وإيقاف الصوت
        document.getElementById('orderAlertOverlay').classList.add('hidden');
        document.getElementById('alertSound').pause();
        
        // 2. ملء بيانات واجهة الطلب النشط
        document.getElementById('activeResName').innerText = currentOrder.resName;
        document.getElementById('activeCustomerArea').innerText = currentOrder.customerArea;
        document.getElementById('activeCustomerPhone').innerText = "هاتف الزبون: " + currentOrder.customerPhone;
        document.getElementById('resPhoneLink').href = "tel:" + currentOrder.resPhone;
        
        // 3. إظهار واجهة الطلب النشط لكي لا يختفي الطلب
        document.getElementById('activeOrderPage').classList.remove('hidden');
        
        // 4. تحديث السيرفر
        updateStatus('accepted');
    }

    function completeOrder() {
        if(confirm("هل تأكدت من استلام المبلغ وتسليم الطلب؟")) {
            updateStatus('completed');
            document.getElementById('activeOrderPage').classList.add('hidden');
            alert("أحسنت يا بطل! تم إنهاء الطلب.");
        }
    }

    function updateStatus(status) {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=ADMIN_UPDATE_STATUS&type=ORDER&id=${currentOrder.id}&status=${status}&token=${API_TOKEN}&callback=dummy`;
        document.body.appendChild(script);
    }

    window.dummy = () => {};
</script>
</body>
</html>
