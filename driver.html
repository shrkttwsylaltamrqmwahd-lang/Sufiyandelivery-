<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رادار الكابتن | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .receipt-card { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(251, 191, 36, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .radar-ping { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        .img-zoom { transition: transform 0.3s; width: 100%; height: auto; border-radius: 1rem; cursor: zoom-in; }
        .img-zoom:active { transform: scale(1.8); z-index: 100; position: relative; }
        .hidden { display: none; }
        .active-mission { border-top: 4px solid #fbbf24; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">
    
    <header class="p-5 bg-slate-900 rounded-b-[2.5rem] border-b border-amber-500/30 shadow-2xl flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="absolute inset-0 bg-amber-500 rounded-full radar-ping opacity-20"></div>
                <div class="w-3 h-3 bg-amber-500 rounded-full relative z-10"></div>
            </div>
            <div>
                <h1 class="text-[10px] font-black text-amber-500 italic uppercase tracking-tighter">Whale Pilot Radar V6.2</h1>
                <p id="welcomeName" class="text-xs text-white font-bold italic text-right tracking-wide">جاري الاتصال بالقاعدة...</p>
            </div>
        </div>
        <button onclick="logout()" class="text-[10px] bg-red-500/10 text-red-400 px-4 py-2 rounded-xl font-black italic border border-red-500/20 active:scale-90 transition-all">خروج</button>
    </header>

    <main class="p-6">
        <div id="searchingStatus" class="text-center mb-8">
            <p id="radarText" class="text-[9px] text-amber-500 font-black uppercase tracking-[0.4em] italic animate-pulse">Scanning Kirkuk Sector...</p>
        </div>

        <div id="orderCard" class="receipt-card p-6 rounded-[2.5rem] relative overflow-hidden hidden active-mission">
            <div class="mb-6 flex flex-col items-center border-b border-white/5 pb-6 text-center">
                <span class="text-[8px] bg-amber-500 text-black px-3 py-0.5 rounded-full font-black uppercase mb-3 italic tracking-widest">مهمة قتالية نشطة</span>
                <h2 id="restaurantTitle" class="text-2xl font-black text-white italic tracking-tight">اسم المطعم</h2>
                <div id="orderStatusBadge" class="mt-3 px-4 py-1.5 rounded-full bg-white/5 text-[10px] font-bold text-amber-400 border border-amber-500/20 italic">بانتظار التحرك</div>
                
                <a id="restMapLink" href="#" target="_blank" class="mt-4 flex items-center gap-2 text-amber-400 bg-amber-500/10 px-4 py-2 rounded-full border border-amber-500/30 text-[10px] font-black italic hover:bg-amber-500/20 transition-all">
                    <i class="fas fa-location-arrow"></i>
                    <span>فتح موقع المطعم (Google Maps)</span>
                </a>
            </div>

            <div id="receiptOnlyView" class="hidden space-y-4 mb-6">
                <p class="text-[9px] text-gray-500 font-black text-center italic uppercase">انقر على الوصل للتكبير 🔍</p>
                <div class="rounded-2xl overflow-hidden border border-white/10 shadow-2xl bg-black">
                    <img id="receiptImg" src="" class="img-zoom" alt="Receipt">
                </div>
            </div>

            <div id="manualInfoView" class="space-y-4">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5">
                    <p class="text-[8px] text-gray-500 font-black uppercase italic mb-1">📍 تفاصيل الوجهة والملاحظات</p>
                    <p id="locationTxt" class="text-sm font-black text-white italic leading-relaxed text-right">جاري جلب البيانات...</p>
                </div>
                
                <div id="customerPhoneSection" class="bg-blue-500/5 p-4 rounded-2xl border border-blue-500/20 flex justify-between items-center hidden">
                    <div>
                        <p class="text-[8px] text-blue-400 font-black uppercase italic mb-1">📞 اتصال سريع بالزبون</p>
                        <p id="phoneTxt" class="text-lg font-black text-blue-400 font-mono tracking-widest italic">077XXXXXXXX</p>
                    </div>
                    <a id="phoneCall" href="#" class="bg-blue-600 w-12 h-12 rounded-2xl text-white shadow-lg shadow-blue-900/40 flex items-center justify-center text-xl active:scale-90 transition-all">
                        <i class="fas fa-phone-alt"></i>
                    </a>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button id="pickUpBtn" onclick="updateOrderStatus('picked-up')" class="w-full bg-amber-500 text-black py-5 rounded-[1.5rem] font-black text-lg active:scale-95 transition-all shadow-xl italic flex items-center justify-center gap-2">
                    <span>استلمت من المطعم 🥡</span>
                </button>
                <button id="deliverBtn" onclick="updateOrderStatus('delivered')" class="w-full bg-emerald-500 text-black py-5 rounded-[1.5rem] font-black text-lg active:scale-95 transition-all shadow-xl italic flex items-center justify-center gap-2 hidden">
                    <span>سلمت للزبون بنجاح ✅</span>
                </button>
                <button onclick="reportProblem()" class="w-full py-3 text-red-500/40 font-bold text-[10px] italic">⚠️ إبلاغ عن مشكلة لطه</button>
            </div>
        </div>

        <div id="noOrders" class="text-center py-32 opacity-20 italic">
            <i class="fas fa-satellite-dish text-6xl mb-4 text-slate-700"></i>
            <p class="text-xs font-black uppercase tracking-[0.3em]">الرادار يبحث عن إشارات في كركوك</p>
        </div>
    </main>

    <script>
        // الرابط السيادي الجديد V6.2 (طه - كركوك)
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec';
        const driverPhone = localStorage.getItem('whale_driver_phone'); 
        let currentOrderID = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!driverPhone) {
                window.location.href = 'driver_login.html';
                return;
            }
            document.getElementById('welcomeName').innerText = "كابتن: " + (localStorage.getItem('whale_driver_name') || "مجهول");
            
            initGPS(); 
            checkOrders(); 
            setInterval(checkOrders, 7000); // تحديث الرادار كل 7 ثوانٍ
        });

        // نظام بث الموقع الفعلي للقاعدة
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        const data = { 
                            action: "update_location", 
                            phone: driverPhone, 
                            lat: pos.coords.latitude, 
                            lng: pos.coords.longitude 
                        };
                        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                    },
                    (err) => console.log("GPS Signal Searching..."),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            }
        }

        async function checkOrders() {
            try {
                // طلب البيانات من الأكشن login_check (لاستخدام البيانات الموجودة في Drivers شيت)
                const res = await fetch(`${scriptURL}?action=login_check&type=Driver&id=${encodeURIComponent(driverPhone)}`);
                const result = await res.json();
                
                // البحث في شيت الطلبات عن طلب مخصص لهذا الكابتن وحالته ليست "delivered"
                const ordersRes = await fetch(`${scriptURL}?action=get_master_data&pass=112233`); // استخدام ممر الماستر لجلب البيانات
                const masterData = await ordersRes.json();
                
                const myOrder = masterData.orders.find(o => String(o[6]) === String(driverPhone) && o[5] !== "delivered");

                if (myOrder) {
                    renderOrder(myOrder);
                    updateRadarUI(true);
                } else {
                    document.getElementById('orderCard').classList.add('hidden');
                    document.getElementById('noOrders').classList.remove('hidden');
                    updateRadarUI(false);
                }
            } catch (e) { 
                console.log("Radar Scanning..."); 
            }
        }

        function updateRadarUI(active) {
            const txt = document.getElementById('radarText');
            txt.innerText = active ? "LOCKED ON MISSION 🐋" : "Scanning Kirkuk Sector...";
            txt.style.color = active ? "#fbbf24" : "#475569";
        }

        function renderOrder(order) {
            currentOrderID = order[0]; 
            document.getElementById('noOrders').classList.add('hidden');
            document.getElementById('orderCard').classList.remove('hidden');
            document.getElementById('restaurantTitle').innerText = order[1];
            
            const mapLink = document.getElementById('restMapLink');
            if (order[10] && order[10].startsWith('http')) {
                mapLink.href = order[10];
                mapLink.classList.remove('hidden');
            } else {
                mapLink.classList.add('hidden');
            }

            const badge = document.getElementById('orderStatusBadge');
            const pBtn = document.getElementById('pickUpBtn');
            const dBtn = document.getElementById('deliverBtn');

            if (order[5] === "picked-up") {
                pBtn.classList.add('hidden');
                dBtn.classList.remove('hidden');
                badge.innerText = "في الطريق لتسليم الزبون 🚀";
                badge.className = "mt-3 px-4 py-1.5 rounded-full bg-blue-500/10 text-[10px] font-bold text-blue-400 border border-blue-500/20 italic";
            } else {
                pBtn.classList.remove('hidden');
                dBtn.classList.add('hidden');
                badge.innerText = "توجه للمطعم لاستلام الطلب 🥡";
            }

            const rView = document.getElementById('receiptOnlyView');
            if (order[4] && order[4].length > 10) {
                rView.classList.remove('hidden');
                document.getElementById('receiptImg').src = order[4];
            } else {
                rView.classList.add('hidden');
            }

            document.getElementById('locationTxt').innerText = order[3] || "لا توجد تفاصيل وجهة";
            
            const phoneMatch = (order[3] || "").match(/07[0-9]{9}/);
            const pSec = document.getElementById('customerPhoneSection');
            if (phoneMatch) {
                pSec.classList.remove('hidden');
                document.getElementById('phoneTxt').innerText = phoneMatch[0];
                document.getElementById('phoneCall').href = "tel:" + phoneMatch[0];
            } else { pSec.classList.add('hidden'); }
        }

        async function updateOrderStatus(newStatus) {
            if (!currentOrderID) return;
            const btn = (newStatus === 'picked-up') ? document.getElementById('pickUpBtn') : document.getElementById('deliverBtn');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerText = "بث الإشارة للقاعدة...";

            try {
                // استخدام master_control لتحديث حالة الطلب في الشيت
                const data = {
                    action: "master_control",
                    targetSheet: "Orders",
                    targetID: currentOrderID,
                    colIndex: 5,
                    newValue: newStatus
                };

                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                
                if (newStatus === 'delivered') {
                    alert("تمت المهمة بنجاح! شكراً لك كابتن. 🐋");
                    document.getElementById('orderCard').classList.add('hidden');
                    currentOrderID = null;
                }
                setTimeout(checkOrders, 1500);
            } catch (e) {
                alert("خطأ في تحديث الحالة.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'driver_login.html'; }
        function reportProblem() {
            const msg = prompt("ما هي المشكلة؟");
            if (msg) alert("تم إشعار الإدارة بالمشكلة.");
        }
    </script>
</body>
</html>
