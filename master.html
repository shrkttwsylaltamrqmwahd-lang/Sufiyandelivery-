<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | قمرة القيادة العليا</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --gold: #ffcc00; 
            --bg-dark: #020617;
            --card-glass: rgba(15, 23, 42, 0.8);
            --border-glass: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: var(--bg-dark); 
            color: #f1f5f9; 
            font-family: 'Tajawal', sans-serif; 
            min-height: 100vh;
            margin: 0;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* تعديلات شاشة الدخول لضمان الظهور */
        #login-block {
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            inset: 0;
            z-index: 9999;
        }

        .login-card {
            width: 100%;
            max-width: 350px;
            padding: 2rem;
            text-align: center;
        }

        .master-input {
            width: 100%;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 1rem;
            padding: 1rem;
            color: #ffcc00;
            text-align: center;
            font-size: 1.25rem;
            outline: none;
            margin-bottom: 1.5rem;
        }

        .master-input:focus { border-color: #ffcc00; }

        /* الزر الجديد بوضوح فائق */
        .login-btn {
            width: 100%;
            background: #ffcc00 !important; /* اللون الذهبي الصريح */
            color: #000 !important; /* نص أسود للتباين */
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
            transition: transform 0.2s;
        }

        .login-btn:active { transform: scale(0.95); }

        #map { height: 450px; border-radius: 2rem; border: 1px solid var(--border-glass); margin: 1rem 0; }
        .glass-panel { background: var(--card-glass); backdrop-filter: blur(16px); border: 1px solid var(--border-glass); border-radius: 1.5rem; padding: 1.5rem; }
        .item-row { background: rgba(255,255,255,0.03); border-radius: 1rem; padding: 12px; margin-bottom: 10px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 1.25rem; text-align: center; padding: 1rem; border: 1px solid var(--border-glass); }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="login-card">
            <i class="fas fa-crown text-5xl text-yellow-500 mb-6"></i>
            <h1 class="orbitron text-2xl font-black text-white mb-8 tracking-tighter">SOVEREIGN ACCESS</h1>
            
            <input type="password" id="master-pass" placeholder="شفرة السيادة" class="master-input" onkeypress="if(event.key === 'Enter') loadMasterData()">
            
            <button onclick="loadMasterData()" class="login-btn">
                <i class="fas fa-lock-open"></i>
                فتح قفل النظام
            </button>
            
            <p class="text-[10px] text-slate-500 orbitron mt-8 tracking-widest uppercase">Admin Command Only</p>
        </div>
    </div>

    <div id="main-ui" class="hidden p-4 md:p-8 space-y-6">
        <header class="flex justify-between items-center bg-slate-900/40 p-6 rounded-[2rem] border border-white/5 shadow-2xl">
            <div>
                <h1 class="orbitron text-2xl font-black text-white">WHALE <span class="text-gold">SOVEREIGN</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Kirkuk Central Command Center</p>
            </div>
            <div class="text-left">
                <p id="clock" class="orbitron text-sm font-bold text-gold">00:00:00</p>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="stat-card"><p class="text-[9px] text-slate-500 mb-1 italic">أرباح اليوم</p><span id="stat-profit" class="orbitron text-lg font-black text-emerald-400">0</span></div>
            <div class="stat-card"><p class="text-[9px] text-slate-500 mb-1 italic">طلبات نشطة</p><span id="stat-count" class="orbitron text-lg font-black text-blue-400">0</span></div>
            <div class="stat-card"><p class="text-[9px] text-slate-500 mb-1 italic">المطاعم</p><span id="stat-rests" class="orbitron text-lg font-black text-purple-400">0</span></div>
            <div class="stat-card"><p class="text-[9px] text-slate-500 mb-1 italic">الطيارين</p><span id="stat-drivers" class="orbitron text-lg font-black text-gold">0</span></div>
        </div>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <section class="glass-panel h-[500px] flex flex-col">
                <h2 class="font-black italic text-gold mb-4 text-sm"><i class="fas fa-crosshairs"></i> رادار الطيارين</h2>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>
            <section class="glass-panel h-[500px] flex flex-col">
                <h2 class="font-black italic text-emerald-400 mb-4 text-sm"><i class="fas fa-store"></i> المحطات</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>
            <section class="glass-panel h-[500px] flex flex-col">
                <h2 class="font-black italic text-blue-400 mb-4 text-sm"><i class="fas fa-box"></i> الطلبات</h2>
                <div id="orders-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Rgnwclf9OJz2uJuBhD4PqDkY9XI0KCnSDhq1bRI558bxT5YLTTozkpZHky20oX9g/exec";
        let map, markers = {};

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0') + ":" + now.getSeconds().toString().padStart(2,'0');
        }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13); 
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("الرمز خاطئ!");
                
                document.getElementById('login-block').style.display = 'none';
                document.getElementById('main-ui').classList.remove('hidden');
                initMap();
                renderUI(data);
                updateMapMarkers(data.drivers);
            } catch (e) { console.error("Error"); }
        }

        setInterval(() => {
            if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true);
        }, 10000);

        function renderUI(data) {
            document.getElementById('stat-rests').innerText = data.restaurants.length;
            document.getElementById('stat-drivers').innerText = data.drivers.length;
            document.getElementById('stat-count').innerText = data.orders.filter(o => o[5] !== 'delivered').length;
            
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => `
                <div class="item-row flex justify-between items-center">
                    <div><p class="font-bold text-xs">${d[1]}</p><p class="text-[9px] text-slate-500">${d[2]}</p></div>
                    <button onclick="trackOnMap(${d[5]}, ${d[6]})" class="text-gold"><i class="fas fa-location-dot"></i></button>
                </div>
            `).join('');

            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => `
                <div class="item-row"><p class="font-bold text-xs">${r[1]}</p></div>
            `).join('');

            document.getElementById('orders-list').innerHTML = data.orders.map(o => `
                <div class="item-row text-[10px]"><p class="text-gold font-bold">#${o[0]}</p><p>${o[1]} ➔ ${o[9]}</p></div>
            `).reverse().join('');
        }

        function updateMapMarkers(drivers) {
            drivers.forEach(d => {
                if (d[5] && d[5] != 0) {
                    if (markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]]).addTo(map);
                }
            });
        }

        function trackOnMap(lat, lng) { if(lat) map.flyTo([lat, lng], 17); }
    </script>
</body>
</html>
