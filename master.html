<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة العمليات الذكية | منظومة الحوت 🐋</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; }
        body { background: #f1f5f9; color: #1e293b; font-family: 'Tajawal', sans-serif; margin: 0; overflow-x: hidden; }
        #map { height: 450px; border-radius: 2.5rem; border: 8px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-bottom: 2rem; z-index: 10; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid white; border-radius: 2rem; padding: 1.5rem; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        
        /* تنبيه الطلبات المتأخرة */
        .critical-pulse { animation: red-pulse 1.5s infinite; border: 2px solid #ef4444 !important; background: #fff1f1 !important; }
        @keyframes red-pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        /* توهج السائق الأنسب */
        .auto-suggest { animation: blue-glow 2s infinite; border: 3px solid #3b82f6 !important; background: #eff6ff !important; transform: scale(1.03); z-index: 50; position: relative; }
        @keyframes blue-glow { 0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); } 50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.7); } }

        .item-row { border-radius: 1.2rem; padding: 14px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .delay-safe { border-right: 6px solid #22c55e; background: white; }
        .delay-warning { border-right: 6px solid #f59e0b; background: #fffbeb; }

        .btn-action { padding: 8px 14px; border-radius: 12px; font-weight: 900; font-size: 10px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; border: none; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-green { background: #22c55e; color: white; }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div id="login-block" class="fixed inset-0 z-[9999] flex items-center justify-center bg-slate-950">
        <div class="max-w-[400px] w-full p-10 text-center glass-panel">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl text-white text-4xl animate-bounce">🐋</div>
            <h1 class="text-2xl font-black mb-2">منظومة الحوت</h1>
            <p class="text-[10px] text-slate-400 mb-8 font-black tracking-widest uppercase italic">Master Control Unit V7.8</p>
            <input type="password" id="master-pass" placeholder="كود الوصول المشفر" class="w-full bg-slate-100 rounded-2xl p-5 text-center mb-4 outline-none font-bold border-2 focus:border-blue-500 transition-all shadow-inner">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all">فتح الرادار المركزي</button>
        </div>
    </div>

    <div id="main-ui" class="hidden max-w-[1900px] mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-panel border-b-8 border-blue-600">
                <p class="text-[10px] font-black text-slate-400 uppercase italic">إجمالي طلبات اليوم</p>
                <h3 id="stat-total" class="text-4xl font-black text-blue-600">0</h3>
            </div>
            <div class="glass-panel border-b-8 border-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase italic">الطيارين النشطين</p>
                <h3 id="stat-drivers" class="text-4xl font-black text-emerald-600">0</h3>
            </div>
            <div class="glass-panel border-b-8 border-amber-500">
                <p class="text-[10px] font-black text-slate-400 uppercase italic">طلبات قيد التوصيل</p>
                <h3 id="stat-active" class="text-4xl font-black text-amber-600">0</h3>
            </div>
            <div class="glass-panel border-b-8 border-red-600">
                <p class="text-[10px] font-black text-slate-400 uppercase italic">مستحقات المطاعم</p>
                <h3 id="stat-debt" class="text-2xl font-black text-red-600">0 <small class="text-xs">د.ع</small></h3>
            </div>
        </div>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <section class="glass-panel h-[800px] flex flex-col border-t-8 border-blue-600">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black text-sm italic uppercase"><i class="fas fa-motorcycle mr-2"></i> أسطول الحوت</h2>
                    <span id="clock" class="text-[10px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full">00:00:00</span>
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

            <section class="glass-panel h-[800px] flex flex-col border-t-8 border-emerald-500">
                <h2 class="font-black text-sm mb-6 italic uppercase text-emerald-600"><i class="fas fa-utensils mr-2"></i> حسابات المطاعم</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

            <section class="glass-panel h-[800px] flex flex-col border-t-8 border-amber-500">
                <h2 class="font-black text-sm mb-6 italic uppercase text-amber-600"><i class="fas fa-satellite-dish mr-2"></i> الرادار الميداني</h2>
                <div id="active-orders" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

            <section class="glass-panel h-[800px] flex flex-col border-t-8 border-slate-400">
                <h2 class="font-black text-sm mb-6 italic uppercase text-slate-500"><i class="fas fa-history mr-2"></i> آخر الطلبات المنجزة</h2>
                <div id="completed-orders" class="overflow-y-auto flex-1 space-y-3 pr-1"></div>
            </section>

        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxODYE0lTSF_v3NdQw1lN0GCq3dcxeEfo3SB9QaDy2Klcg3NEMvs3GxUjHFxQ5fooQm2Q/exec";
        let map, markers = {}, currentData = null, selectedOrderID = null;

        // إحداثيات مناطق كركوك الرئيسية للخريطة الحرارية
        const locationsCoords = {
            "الماس": [35.478, 44.385], "طريق بغداد": [35.455, 44.375], "التسعين": [35.460, 44.395],
            "شارع المحافظة": [35.468, 44.392], "قورية": [35.475, 44.398], "بنجه علي": [35.485, 44.420],
            "عرفه": [35.495, 44.370], "حي الواسطي": [35.425, 44.360], "حي حزيران": [35.435, 44.380],
            "المصلى": [35.472, 44.382], "حي عدن": [35.445, 44.405], "حي الخضراء": [35.458, 44.425], "حي العسكري": [35.440, 44.415]
        };

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}&cb=${Date.now()}`);
                const data = await res.json();
                if (data.status === "denied") return alert("كود الدخول خاطئ!");
                
                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').classList.add('hidden'); 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // خوارزمية الحوت لتحديد أفضل سائق للمهمة
        function getBestDriver(orderArea) {
            if (!currentData || !orderArea) return null;
            const dest = locationsCoords[orderArea];
            if (!dest) return null;

            let bestID = null;
            let maxScore = -Infinity;

            currentData.drivers.forEach(d => {
                if (d[4] !== 'active' || !d[5]) return; 
                
                const dist = Math.sqrt(Math.pow(d[5]-dest[0], 2) + Math.pow(d[6]-dest[1], 2));
                const todayDone = currentData.orders.filter(o => o[6] === d[1] && o[5] === 'delivered').length;
                
                // سكور ذكي: يوازن بين القرب وعدد المهام (لتحقيق العدالة في التوزيع)
                const score = (1 / (dist + 0.1)) * (1 / (todayDone + 1));

                if (score > maxScore) {
                    maxScore = score;
                    bestID = d[2]; // رقم الهاتف
                }
            });
            return bestID;
        }

        function renderUI(data) {
            const activeOrders = data.orders.filter(o => o[5] !== 'delivered');
            const completedOrders = data.orders.filter(o => o[5] === 'delivered');

            // حساب المديونيات
            let totalDebt = 0;
            data.restaurants.forEach(r => {
                const count = completedOrders.filter(o => o[1] === r[1]).length;
                totalDebt += (count * parseFloat(r[5] || 0));
            });
            
            document.getElementById('stat-debt').innerText = totalDebt.toLocaleString();
            document.getElementById('stat-total').innerText = data.orders.length;
            document.getElementById('stat-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
            document.getElementById('stat-active').innerText = activeOrders.length;

            // الطلبات النشطة مع الرادار
            document.getElementById('active-orders').innerHTML = activeOrders.reverse().map(o => {
                const diff = Math.floor(((new Date()) - new Date(o[7])) / 60000);
                let stateClass = diff > 40 ? "critical-pulse" : (diff > 20 ? "delay-warning" : "delay-safe");
                
                return `
                <div class="item-row ${stateClass} cursor-pointer shadow-sm" onclick="selectOrder('${o[0]}')">
                    <div class="flex justify-between text-[10px] font-black mb-1">
                        <span class="text-blue-600">ID: #${o[0]}</span> 
                        <span class="${diff > 30 ? 'text-red-600 animate-bounce' : 'text-slate-400'}">⏳ ${diff} دقيقة</span>
                    </div>
                    <p class="font-black text-xs">${o[1]}</p>
                    <p class="text-[10px] font-bold text-slate-500"><i class="fas fa-map-marker-alt text-red-500"></i> ${o[9]}</p>
                </div>`;
            }).join('');

            // السائقون مع التوهج التلقائي
            const targetOrder = data.orders.find(o => o[0] == selectedOrderID);
            const bestDriverID = targetOrder ? getBestDriver(targetOrder[9]) : null;

            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => {
                const isBest = d[2] == bestDriverID;
                const dailyCount = completedOrders.filter(o => o[6] === d[1]).length;
                return `
                <div class="item-row ${isBest ? 'auto-suggest' : (d[4]==='active'?'bg-white':'bg-slate-100 opacity-60')}">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-xs text-slate-800">${d[1]} ${isBest ? '⭐' : ''}</span>
                        <span class="text-[9px] font-black bg-blue-100 text-blue-700 px-2 py-1 rounded-lg">إنجاز: ${dailyCount}</span>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="trackOnMap(${d[5]},${d[6]})" class="btn-action btn-blue flex-1 justify-center"><i class="fas fa-crosshairs"></i></button>
                        <button onclick="control('Drivers','${d[2]}',4,'${d[4]==='active'?'pending':'active'}')" class="btn-action ${d[4]==='active'?'btn-red':'btn-green'} flex-1 justify-center">
                            ${d[4]==='active'?'حظر':'تفعيل'}
                        </button>
                    </div>
                </div>`;
            }).join('');

            // المطاعم والديون
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const debt = completedOrders.filter(o => o[1] === r[1]).length * r[5];
                return `
                <div class="item-row bg-white border-r-4 border-emerald-500">
                    <p class="font-black text-xs mb-1 text-slate-800">${r[1]}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-black text-red-600">المستحق: ${debt.toLocaleString()} د.ع</span>
                        <a href="tel:${r[2]}" class="text-slate-300 hover:text-emerald-500"><i class="fas fa-phone"></i></a>
                    </div>
                </div>`;
            }).join('');

            // الأرشيف
            document.getElementById('completed-orders').innerHTML = completedOrders.reverse().slice(0, 15).map(o => `
                <div class="item-row bg-slate-50 border-r-4 border-slate-300 opacity-70">
                    <p class="text-[9px] font-bold text-slate-600">${o[1]} ➔ ${o[6]}</p>
                </div>`).join('');

            updateHeatmap(activeOrders);
        }

        function selectOrder(id) {
            selectedOrderID = id;
            loadMasterData(true);
        }

        function updateHeatmap(orders) {
            map.eachLayer(layer => { if(layer instanceof L.Circle) map.removeLayer(layer); });
            const counts = {};
            orders.forEach(o => { counts[o[9]] = (counts[o[9]] || 0) + 1; });
            Object.keys(counts).forEach(area => {
                if(locationsCoords[area]) {
                    L.circle(locationsCoords[area], {
                        color: counts[area] > 3 ? '#ef4444' : '#3b82f6',
                        fillOpacity: 0.2,
                        radius: 150 + (counts[area] * 70)
                    }).addTo(map);
                }
            });
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 1000);
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return alert("الكابتن غير متصل بالـ GPS");
            map.flyTo([lat, lng], 17);
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    const color = d[4]==='active' ? '#22c55e' : '#94a3b8';
                    const icon = L.divIcon({className: 'c-icon', html: `<div style="background: ${color}; width: 14px; height: 14px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.3);"></div>`});
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]], {icon: icon}).addTo(map);
                }
            });
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 10000);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);
    </script>
</body>
</html>
