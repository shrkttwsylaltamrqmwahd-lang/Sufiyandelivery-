<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --success-green: #10b981;
            --bg-light: #f8fafc;
        }

        body { background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شاشة القفل */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 40px; width: 400px; color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center;
        }

        /* الهيكل الجانبي */
        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; padding: 20px; z-index: 1000;
        }
        .main-content { margin-right: var(--sidebar-width); padding: 30px; min-height: 100vh; transition: 0.3s; }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 14px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { border-right: 4px solid var(--accent-orange); }

        /* الكروت */
        .stat-widget {
            background: white; border-radius: 24px; padding: 25px; display: flex;
            justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }
        .icon-shape { width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }

        #adminMap { height: 450px; width: 100%; border-radius: 30px; border: 8px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #e5e7eb; }

        .custom-table { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .table th { padding: 20px; background: #f1f5f9; border: none; font-weight: 700; color: #475569; }
        .table td { padding: 20px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }

        .hidden-content { display: none !important; }
        .badge-status { padding: 6px 14px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }
        
        /* ألوان الحالات */
        .status-delivered { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .status-active { background: #dbeafe; color: #1e40af; }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(100%); width: 0; padding: 0; }
            .main-content { margin-right: 0; }
            .sidebar.mobile-open { transform: translateX(0); width: var(--sidebar-width); padding: 20px; }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield-check" size="60" color="#f97316"></i></div>
        <h3 class="fw-black mb-2">مركز التحكم</h3>
        <p class="text-muted small mb-4">نظام الحوت لإدارة العمليات</p>
        <input type="password" id="masterPass" class="form-control form-control-lg bg-dark text-white border-0 text-center mb-3 shadow-none" placeholder="••••••••" style="letter-spacing: 4px;">
        <button class="btn btn-warning w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">تحقق من الهوية</button>
    </div>
</div>

<div class="hidden-content" id="mainDashboard">
    <aside class="sidebar shadow" id="sidebar">
        <div class="d-flex align-items-center gap-2 mb-5 px-3">
            <i data-lucide="waves" color="#f97316" size="32"></i>
            <h4 class="m-0 fw-black">الحوت <span class="text-warning">PRO</span></h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="layout-dashboard"></i> <span>الرصد الحي</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-cart"></i> <span>إدارة الطلبات</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="utensils"></i> <span>المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="truck"></i> <span>الكباتن</span></div>
            <div class="mt-5 pt-5">
                <div class="nav-item text-danger" onclick="location.reload()">
                    <i data-lucide="log-out"></i> <span>خروج آمن</span>
                </div>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div id="tab-live" class="admin-tab">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="fw-black m-0">نظرة عامة</h2>
                    <p class="text-muted">مراقبة لحظية لأسطول كركوك</p>
                </div>
                <div id="liveTime" class="badge bg-white text-dark p-3 rounded-4 shadow-sm fw-bold border">00:00:00</div>
            </header>

            <div class="row g-4 mb-5">
                <div class="col-md-4">
                    <div class="stat-widget">
                        <div><small class="text-muted fw-bold">الطلبات</small><h2 class="fw-black m-0 mt-1" id="count-orders">0</h2></div>
                        <div class="icon-shape bg-primary bg-opacity-10 text-primary"><i data-lucide="package"></i></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-widget">
                        <div><small class="text-muted fw-bold">كباتن متصلين</small><h2 class="fw-black m-0 mt-1 text-success" id="count-drivers">0</h2></div>
                        <div class="icon-shape bg-success bg-opacity-10 text-success"><i data-lucide="navigation"></i></div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-widget">
                        <div><small class="text-muted fw-bold">المطاعم</small><h2 class="fw-black m-0 mt-1 text-warning" id="count-res">0</h2></div>
                        <div class="icon-shape bg-warning bg-opacity-10 text-warning"><i data-lucide="store"></i></div>
                    </div>
                </div>
            </div>

            <div class="card border-0 rounded-5 overflow-hidden shadow-sm">
                <div id="adminMap"></div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <h3 class="fw-bold mb-4">سجل الطلبات الحية</h3>
            <div class="custom-table table-responsive">
                <table class="table m-0">
                    <thead>
                        <tr><th>ID</th><th>المطعم</th><th>السائق</th><th>المنطقة</th><th>الحالة</th><th>الإجراء</th></tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-restaurants" class="admin-tab d-none">
            <h3 class="fw-bold mb-4">إدارة المطاعم</h3>
            <div class="row g-3" id="resListContainer"></div>
        </div>

        <div id="tab-drivers" class="admin-tab d-none">
            <h3 class="fw-bold mb-4">فريق الكباتن</h3>
            <div class="row g-3" id="driverListContainer"></div>
        </div>
    </main>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMasterMap"></script>
<script>
    // تهيئة الأيقونات
    lucide.createIcons();

    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    let map;

    function checkAuth() {
        const pass = document.getElementById('masterPass').value;
        if(pass === "223344") {
            document.getElementById('authOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainDashboard').classList.remove('hidden-content');
                startClock();
                refreshData();
                setInterval(refreshData, 20000); // تحديث كل 20 ثانية
            }, 500);
        } else {
            alert("كلمة المرور غير صحيحة");
        }
    }

    function startClock() {
        setInterval(() => {
            document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG');
        }, 1000);
    }

    function showTab(event, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById('tab-' + name).classList.remove('d-none');
        event.currentTarget.classList.add('active');
        lucide.createIcons();
    }

    function initMasterMap() {
        const karkuk = { lat: 35.468, lng: 44.392 };
        map = new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13,
            center: karkuk,
            disableDefaultUI: true,
            styles: [
                { "featureType": "all", "elementType": "geometry", "stylers": [{"color": "#242f3e"}] },
                { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{"color": "#746855"}] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{"color": "#17263c"}] }
            ] // ستايل ليلي احترافي
        });
    }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData`;
        document.body.appendChild(script);
        // حذف الـ script بعد التحميل للحفاظ على نظافة الـ DOM
        script.onload = () => script.remove();
    }

    window.renderData = function(data) {
        if(!data) return;

        // تحديث العدادات (تأكد من وجود البيانات)
        document.getElementById('count-orders').innerText = (data.orders?.length || 1) - 1;
        document.getElementById('count-drivers').innerText = data.drivers?.filter(d => d[4] === 'active').length || 0;
        document.getElementById('count-res').innerText = data.restaurants?.filter(r => r[4] === 'active').length || 0;

        // رص الطلبات
        let orderHtml = '';
        if(data.orders && data.orders.length > 1) {
            data.orders.slice(1).reverse().forEach(o => {
                const statusClass = o[6] === 'تم التوصيل' ? 'status-delivered' : 'status-pending';
                orderHtml += `
                    <tr>
                        <td><span class="fw-bold">#${o[1] || '000'}</span></td>
                        <td>${o[2] || '---'}</td>
                        <td>${o[7] || '<span class="text-muted small">بانتظار سائق</span>'}</td>
                        <td>${o[9] || '---'}</td>
                        <td><span class="badge-status ${statusClass}">${o[6] || 'معلق'}</span></td>
                        <td><button class="btn btn-sm btn-light border rounded-3"><i data-lucide="eye" size="14"></i></button></td>
                    </tr>`;
            });
        } else {
            orderHtml = '<tr><td colspan="6" class="text-center p-5 text-muted">لا توجد طلبات نشطة حالياً</td></tr>';
        }
        document.getElementById('ordersTableBody').innerHTML = orderHtml;

        // رص القوائم
        renderGrid('resListContainer', data.restaurants, 'store');
        renderGrid('driverListContainer', data.drivers, 'truck');
        
        lucide.createIcons();
    };

    function renderGrid(id, list, icon) {
        let html = '';
        if(list && list.length > 1) {
            list.slice(1).forEach(i => {
                const statusBadge = i[4] === 'active' ? 'bg-success' : 'bg-secondary';
                html += `
                    <div class="col-md-4">
                        <div class="stat-widget">
                            <div class="d-flex align-items-center gap-3">
                                <div class="icon-shape bg-light text-dark"><i data-lucide="${icon}"></i></div>
                                <div>
                                    <h6 class="m-0 fw-bold">${i[1]}</h6>
                                    <small class="text-muted">${i[2] || ''}</small>
                                </div>
                            </div>
                            <span class="badge rounded-pill ${statusBadge}" style="font-size: 0.6rem;">${i[4]}</span>
                        </div>
                    </div>`;
            });
        } else {
            html = '<div class="col-12 text-center text-muted">لا توجد بيانات متاحة</div>';
        }
        document.getElementById(id).innerHTML = html;
    }
</script>
</body>
</html>
