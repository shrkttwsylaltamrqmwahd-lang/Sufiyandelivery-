<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Hut Sovereign | التحكم المطلق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #ffcc00; --bg-dark: #020617; --card-glass: rgba(15, 23, 42, 0.8); --border-glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg-dark); color: #f1f5f9; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        #login-block { background: #010409; display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        #map { height: 400px; border-radius: 2.5rem; border: 1px solid var(--border-glass); margin: 1.5rem 0; z-index: 10; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .glass-panel { background: var(--card-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 2rem; padding: 1.5rem; margin-bottom: 1rem; }
        .item-row { background: rgba(255,255,255,0.03); border-radius: 1.2rem; padding: 14px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-action { padding: 8px; border-radius: 12px; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .btn-green { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .btn-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .btn-blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .btn-yellow { background: rgba(255, 204, 0, 0.15); color: #ffcc00; }
        .hidden { display: none; }
        input::placeholder { color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[350px] w-full p-8 text-center glass-panel">
            <div class="w-20 h-20 bg-yellow-500 rounded-3xl mx-auto mb-6 flex items-center justify-center">
                <i class="fas fa-crown text-4xl text-slate-900"></i>
            </div>
            <h1 class="orbitron text-2xl font-black text-white mb-8 uppercase italic">AL-HUT <span class="text-gold">MASTER</span></h1>
            <input type="password" id="master-pass" placeholder="أدخل شفرة السيادة" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-center text-gold mb-6 outline-none focus:border-gold">
            <button onclick="loadMasterData()" class="w-full bg-gold text-black p-4 rounded-2xl font-black orbitron italic uppercase">INITIATE COMMAND</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-4 max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gold rounded-lg flex items-center justify-center text-slate-900 font-black shadow-lg">M</div>
                <h1 class="orbitron text-xl font-black text-white italic tracking-widest uppercase">SOVEREIGN <span class="text-gold">CORE</span></h1>
            </div>
            <div id="clock" class="orbitron text-sm text-gold font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10 italic">00:00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-gold">
                <div class="mb-4">
                    <h2 class="font-black text-gold text-xs uppercase italic mb-2"><i class="fas fa-motorcycle mr-2"></i> رادار الطيارين</h2>
                    <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="ابحث عن اسم أو رقم طيار..." class="w-full bg-white/5 border border-white/10 rounded-xl p-2 text-[10px] outline-none focus:border-gold">
                </div>
                <div id="drivers-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-emerald-400 mb-4 text-xs uppercase italic"><i class="fas fa-store mr-2"></i> إدارة المحطات والعمولات</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-blue-500">
                <h2 class="font-black text-blue-400 mb-4 text-xs uppercase italic"><i class="fas fa-bolt mr-2"></i> تدفق العمليات المباشر</h2>
                <div id="orders-list" class="overflow-y-auto flex-1 pr-1"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec";
        let map, markers = {}, currentData = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("خطأ في شفرة السيادة!");

                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').style.display = 'none'; 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function renderUI(data) {
            // رندر السائقين
            renderDrivers(data.drivers);

            // رندر المطاعم مع حساب العمولات
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const totalOrders = data.orders.filter(o => o[1] === r[1]).length;
                const totalDebt = totalOrders * parseFloat(r[5] || 0);
                return `
                <div class="item-row">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <span class="font-black text-emerald-400 text-xs block">${r[1]}</span>
                            <span class="text-[9px] text-white/40 italic">${r[2]}</span>
                        </div>
                        <span class="status-badge text-[8px] px-2 py-1 rounded bg-emerald-500/10 ${r[4] === 'active' ? 'text-emerald-500' : 'text-amber-500'}">${r[4]}</span>
                    </div>
                    <div class="bg-white/5 p-2 rounded-xl mb-3 flex justify-between items-center border border-white/5">
                        <div class="text-[9px]">
                            <p class="text-white/40">الطلبات: <span class="text-white font-bold">${totalOrders}</span></p>
                            <p class="text-white/40">الذمة: <span class="text-gold font-bold">${totalDebt} IQD</span></p>
                        </div>
                        <button onclick="resetCommission('${r[2]}')" class="text-[8px] bg-red-500/20 text-red-500 px-2 py-1 rounded-lg font-black hover:bg-red-500 hover:text-white transition-all">تصفير الحساب</button>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-check"></i></button>
                        <button onclick="control('Restaurants', '${r[2]}', 4, 'pending')" class="btn-action btn-yellow"><i class="fas fa-pause"></i></button>
                        <a href="tel:${r[2]}" class="btn-action btn-blue"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-action btn-red"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).join('');

            // رندر الطلبيات
            document.getElementById('orders-list').innerHTML = data.orders.map(o => {
                const driverPhone = o[6]; // عمود السائق المخصص
                const customerPhone = o[3].match(/07\d{9}/) || ""; // استخراج هاتف الزبون من التفاصيل
                return `
                <div class="item-row text-[10px]">
                    <div class="flex justify-between border-b border-white/5 pb-2 mb-2">
                        <span class="text-gold font-black italic">#${o[0]}</span>
                        <span class="text-white/40">${o[5]}</span>
                    </div>
                    <div class="space-y-1 mb-3">
                        <p class="text-white font-bold"><i class="fas fa-store text-emerald-500 mr-1"></i> ${o[1]}</p>
                        <p class="text-white/60"><i class="fas fa-user-tag text-blue-400 mr-1"></i> الطيار: ${driverPhone || "جاري البحث..."}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="tel:${o[10]}" class="flex-1 bg-emerald-500/10 text-emerald-500 py-2 rounded-lg text-center font-black"><i class="fas fa-phone-alt mr-1"></i> المحل</a>
                        ${customerPhone ? `<a href="tel:${customerPhone}" class="flex-1 bg-blue-500/10 text-blue-500 py-2 rounded-lg text-center font-black"><i class="fas fa-mobile-alt mr-1"></i> الزبون</a>` : ''}
                        <button onclick="deleteItem('Orders', '${o[0]}')" class="btn-action btn-red"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
            }).reverse().join('');
        }

        function renderDrivers(drivers) {
            document.getElementById('drivers-list').innerHTML = drivers.map(d => `
                <div class="item-row text-[11px] driver-item" data-name="${d[1]}" data-phone="${d[2]}">
                    <div class="flex justify-between mb-2">
                        <span class="font-black text-white">${d[1]}</span>
                        <span class="text-gold text-[9px]">${d[4]}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="trackOnMap(${d[5]}, ${d[6]})" class="btn-action btn-blue"><i class="fas fa-crosshairs"></i></button>
                        <button onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-action btn-green"><i class="fas fa-check"></i></button>
                        <a href="tel:${d[2]}" class="btn-action btn-yellow"><i class="fas fa-phone"></i></a>
                        <button onclick="deleteItem('Drivers', '${d[2]}')" class="btn-action btn-red"><i class="fas fa-user-slash"></i></button>
                    </div>
                </div>`).join('');
        }

        function filterDrivers() {
            const val = document.getElementById('searchDriver').value.toLowerCase();
            document.querySelectorAll('.driver-item').forEach(el => {
                const text = el.getAttribute('data-name').toLowerCase() + el.getAttribute('data-phone');
                el.classList.toggle('hidden', !text.includes(val));
            });
        }

        async function resetCommission(phone) {
            const pass = prompt("أدخل شفرة السيادة لتأكيد تصفير حساب المطعم:");
            if (pass === document.getElementById('master-pass').value) {
                // منطق التصفير هنا (يمكنك ربطه بعملية في السيرفر لمسح الطلبات القديمة أو إضافة علامة "مدفوع")
                alert("تم تصفير الحساب بنجاح (برمجياً)");
                loadMasterData(true);
            } else { alert("الشفرة خاطئة!"); }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("حذف نهائي؟")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 1000);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 1000);
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return alert("الطيار غير متصل بالرادار.");
            map.flyTo([lat, lng], 16);
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 15000);
    </script>
</body>
</html>
