<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم سفيان | منظومة الحوت</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --bg-body: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --border: rgba(0, 0, 0, 0.05); }
        body { background: var(--bg-body); color: #1e293b; font-family: 'Tajawal', sans-serif; min-height: 100vh; margin: 0; overflow-x: hidden; }
        #login-block { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; position: fixed; inset: 0; z-index: 9999; }
        #map { height: 350px; border-radius: 2rem; border: 4px solid white; margin: 1.5rem 0; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); z-index: 10; }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        .item-row { border-radius: 1rem; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); transition: all 0.2s ease; }
        .row-active { background: white; }
        .row-pending { background: #fffbeb; border: 1px solid #fde68a; }
        .row-completed { background: #f0fdf4; border: 1px solid #bbf7d0; }

        .btn-text { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; transition: 0.2s; text-align: center; display: inline-block; }
        .btn-text:active { transform: scale(0.95); }
        
        .btn-green { background: #22c55e; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-yellow { background: #f59e0b; color: white; }
        .btn-gray { background: #64748b; color: white; }
        .btn-outline-red { border: 1px solid #ef4444; color: #ef4444; background: white; }

        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="login-block">
        <div class="max-w-[380px] w-full p-10 text-center glass-panel">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl">
                <i class="fas fa-shield-halved text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-2">لوحة تحكم سفيان</h1>
            <input type="password" id="master-pass" placeholder="أدخل رمز الدخول" class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl p-4 text-center text-blue-600 mb-6 outline-none font-bold">
            <button onclick="loadMasterData()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black transition-all active:scale-95">دخول النظام</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-6 max-w-[1700px] mx-auto">
        <header class="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-lg">S</div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 leading-none">لوحة تحكم سفيان</h1>
                    <span class="text-[10px] text-blue-600 font-bold uppercase">AL-HUT MASTER CONTROL</span>
                </div>
            </div>
            <div id="clock" class="font-bold text-slate-600 bg-slate-100 px-6 py-2 rounded-2xl text-sm border border-slate-200">00:00:00</div>
        </header>

        <div id="map"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-6">
            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-blue-600">
                <h2 class="font-black text-sm mb-3"> رادار الطيارين</h2>
                <input type="text" id="searchDriver" oninput="filterDrivers()" placeholder="بحث عن طيار..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-xs mb-4 outline-none focus:border-blue-500">
                <div id="drivers-list" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-emerald-500">
                <h2 class="font-black text-sm mb-3 text-emerald-600"> المطاعم والمحاسبة</h2>
                <div id="rests-list" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-amber-500">
                <h2 class="font-black text-sm mb-3 text-amber-600"> طلبات جارية الآن</h2>
                <div id="active-orders" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>

            <section class="glass-panel h-[650px] flex flex-col border-t-4 border-slate-400">
                <h2 class="font-black text-sm mb-3 text-slate-500"> أرشيف الطلبات المكتملة</h2>
                <div id="completed-orders" class="overflow-y-auto flex-1 space-y-2"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqK63Xu4b2G8BN0aNQIs42oTqvvYRlGDLfQCCSMo68YPYoysKjQ_IjoXhie0MhIaZpQ/exec";
        let map, markers = {}, currentData = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000);

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([35.467, 44.392], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        async function loadMasterData(isSilent = false) {
            const pass = document.getElementById('master-pass').value;
            if(!pass) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_master_data&pass=${encodeURIComponent(pass)}`);
                const data = await res.json();
                if (data.status === "denied") return alert("الرمز خطأ!");
                currentData = data;
                if (!isSilent) { 
                    document.getElementById('login-block').style.display = 'none'; 
                    document.getElementById('main-ui').classList.remove('hidden'); 
                    initMap(); 
                }
                renderUI(data);
                updateMarkers(data.drivers);
            } catch (e) { console.error("Sync Error"); }
        }

        function renderUI(data) {
            // رندر السائقين
            document.getElementById('drivers-list').innerHTML = data.drivers.map(d => {
                const isActive = d[4] === 'active';
                return `
                <div class="item-row ${isActive ? 'row-active' : 'row-pending'}">
                    <div class="mb-2">
                        <span class="font-black text-xs block">${d[1]}</span>
                        <span class="text-[9px] text-slate-500">${d[2]}</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <span onclick="trackOnMap(${d[5]}, ${d[6]})" class="btn-text btn-blue">تتبع</span>
                        ${isActive 
                            ? `<span onclick="control('Drivers', '${d[2]}', 4, 'pending')" class="btn-text btn-yellow">تعليق مؤقت</span>`
                            : `<span onclick="control('Drivers', '${d[2]}', 4, 'active')" class="btn-text btn-green">قبول انضمام</span>`
                        }
                        <a href="tel:${d[2]}" class="btn-text btn-gray">اتصال</a>
                        <span onclick="deleteItem('Drivers', '${d[2]}')" class="btn-text btn-red">حذف</span>
                    </div>
                </div>`;
            }).join('');

            // رندر المطاعم مع المحاسبة
            document.getElementById('rests-list').innerHTML = data.restaurants.map(r => {
                const isActive = r[4] === 'active';
                const totalOrders = data.orders.filter(o => o[1] === r[1]).length;
                const totalDebt = totalOrders * parseFloat(r[5] || 0);

                return `
                <div class="item-row ${isActive ? 'row-active shadow-sm' : 'row-pending'}">
                    <div class="mb-2 border-b border-slate-100 pb-2">
                        <span class="font-black text-xs block text-slate-800">${r[1]}</span>
                        <span class="text-[10px] text-blue-600 font-bold block">📍 ${r[3] || 'Kirkuk'}</span>
                    </div>
                    
                    <div class="bg-slate-50 p-2 rounded-lg mb-3 flex justify-between items-center">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold">الطلبات: <span class="text-slate-900">${totalOrders}</span></p>
                            <p class="text-[9px] text-slate-500 font-bold">المستحق: <span class="text-red-600 font-black">${totalDebt} د.ع</span></p>
                        </div>
                        <span onclick="resetCommission('${r[2]}')" class="btn-text btn-outline-red text-[9px] py-1 px-2">تصفير الحساب</span>
                    </div>

                    <div class="flex flex-wrap gap-2">
                        ${isActive 
                            ? `<span onclick="control('Restaurants', '${r[2]}', 4, 'pending')" class="btn-text btn-yellow">تعليق مؤقت</span>`
                            : `<span onclick="control('Restaurants', '${r[2]}', 4, 'active')" class="btn-text btn-green">قبول انضمام</span>`
                        }
                        <a href="tel:${r[2]}" class="btn-text btn-gray">اتصال</a>
                        <span onclick="deleteItem('Restaurants', '${r[2]}')" class="btn-text btn-red">حذف</span>
                    </div>
                </div>`;
            }).join('');

            // فصل الطلبات
            const activeOrders = data.orders.filter(o => o[5] !== 'delivered');
            const completedOrders = data.orders.filter(o => o[5] === 'delivered');

            const orderTemplate = (o) => {
                const rest = data.restaurants.find(r => r[1] === o[1]);
                const driver = data.drivers.find(d => d[2] == o[6]);
                const statusLabel = o[5] === 'assigned' ? `الطيار ${driver ? driver[1] : ''} بالمطعم` : 'يبحث عن سائق...';
                
                return `
                <div class="item-row ${o[5] === 'delivered' ? 'row-completed' : 'row-active shadow-md border-amber-200'}">
                    <div class="flex justify-between border-b pb-1 mb-2">
                        <span class="font-black text-[11px] text-blue-600">طلب #${o[0]}</span>
                        <span class="text-[9px] font-bold text-slate-500">${o[5] === 'delivered' ? 'مكتمل ✅' : statusLabel}</span>
                    </div>
                    <div class="text-xs mb-3">
                        <p class="font-black text-slate-800">${o[1]}</p>
                        <p class="text-[10px] text-slate-500 font-bold mb-1 italic">الموقع: ${rest ? rest[3] : 'غير محدد'}</p>
                        <p class="text-[10px] bg-slate-100 p-1 rounded font-bold">الكابتن: ${driver ? driver[1] : 'قيد الانتظار'}</p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <a href="tel:${o[10]}" class="btn-text btn-blue">اتصال بالمطعم</a>
                        ${driver ? `<a href="tel:${driver[2]}" class="btn-text btn-yellow">اتصال بالكابتن</a>` : ''}
                        <span onclick="deleteItem('Orders', '${o[0]}')" class="btn-text btn-red">حذف</span>
                    </div>
                </div>`;
            };

            document.getElementById('active-orders').innerHTML = activeOrders.reverse().map(orderTemplate).join('');
            document.getElementById('completed-orders').innerHTML = completedOrders.reverse().map(orderTemplate).join('');
        }

        async function resetCommission(phone) {
            const pass = prompt("أدخل رمز السيادة لتأكيد تصفير حساب هذا المطعم:");
            if (pass === document.getElementById('master-pass').value) {
                // ملاحظة: هنا يجب أن ترسل أمر برمجياً لتصفير الطلبات في شيت الأوردرات أو حقل العمولة
                alert("تم تنفيذ طلب التصفير بنجاح ✅");
                loadMasterData(true);
            } else { alert("الرمز غير صحيح!"); }
        }

        async function deleteItem(sheet, id) {
            if(!confirm("حذف نهائي؟ لن تتمكن من استرجاع البيانات.")) return;
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete_item', pass: pass, targetSheet: sheet, targetID: id }) });
            setTimeout(() => loadMasterData(true), 500);
        }

        async function control(target, id, col, val) {
            const pass = document.getElementById('master-pass').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'master_control', pass: pass, targetSheet: target, targetID: id, colIndex: col, newValue: val }) });
            setTimeout(() => loadMasterData(true), 500);
        }

        function trackOnMap(lat, lng) {
            if(!lat || lat == 0) return alert("الطيار غير متصل حالياً.");
            map.flyTo([lat, lng], 16, { animate: true, duration: 1 });
        }

        function updateMarkers(drivers) {
            drivers.forEach(d => {
                if(d[5] && d[5] != 0) {
                    if(markers[d[2]]) markers[d[2]].setLatLng([d[5], d[6]]);
                    else markers[d[2]] = L.marker([d[5], d[6]]).addTo(map).bindPopup(d[1]);
                }
            });
        }

        setInterval(() => { if (!document.getElementById('main-ui').classList.contains('hidden')) loadMasterData(true); }, 10000);
    </script>
</body>
</html>
