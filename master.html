<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم العليا | نظام الحوت</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-color: #2c3e50; --accent-color: #e67e22; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .sidebar-nav { background: var(--main-color); min-height: 100vh; color: white; padding-top: 20px; }
        .nav-link { color: rgba(255,255,255,0.7); margin-bottom: 10px; cursor: pointer; }
        .nav-link.active { color: white; background: rgba(255,255,255,0.1); border-radius: 5px; }
        #adminMap { height: 500px; width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card { border: none; border-radius: 10px; transition: 0.3s; color: white; }
        .stat-card:hover { transform: translateY(-5px); }
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--main-color); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .hidden-content { display: none; }
        .card-res, .card-driver { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="card p-4 text-center" style="width: 350px;">
        <h4>نظام الحوت | تسجيل دخول</h4>
        <input type="password" id="masterPass" class="form-control my-3 text-center" placeholder="أدخل كلمة السر للمتابعة">
        <button class="btn btn-primary w-100" id="loginBtn" onclick="checkAuth()">دخول</button>
    </div>
</div>

<div class="container-fluid hidden-content" id="mainDashboard">
    <div class="row">
        <div class="col-md-2 sidebar-nav d-none d-md-block">
            <h4 class="text-center mb-4">لوحة المدير</h4>
            <nav class="nav flex-column px-3">
                <a class="nav-link active" onclick="showTab('live')"><i class="fa fa-satellite-dish me-2"></i> المراقبة الحية</a>
                <a class="nav-link" onclick="showTab('orders')"><i class="fa fa-shopping-cart me-2"></i> الطلبات الحالية</a>
                <a class="nav-link" onclick="showTab('restaurants')"><i class="fa fa-utensils me-2"></i> المطاعم</a>
                <a class="nav-link" onclick="showTab('drivers')"><i class="fa fa-motorcycle me-2"></i> السواق</a>
            </nav>
        </div>

        <div class="col-md-10 p-4">
            <div id="tab-live" class="admin-tab">
                <div class="row mb-4">
                    <div class="col-md-4"><div class="stat-card bg-primary p-3"><h5>طلبات نشطة: <span id="count-orders">0</span></h5></div></div>
                    <div class="col-md-4"><div class="stat-card bg-success p-3"><h5>سواق متاحين: <span id="count-drivers">0</span></h5></div></div>
                    <div class="col-md-4"><div class="stat-card bg-warning p-3 text-dark"><h5>مطاعم مفعلة: <span id="count-res">0</span></h5></div></div>
                </div>
                <div id="adminMap"></div>
            </div>

            <div id="tab-orders" class="admin-tab d-none">
                <h3>الطلبات قيد التنفيذ</h3>
                <div class="table-responsive bg-white p-3 rounded shadow-sm">
                    <table class="table">
                        <thead>
                            <tr><th>رقم الطلب</th><th>المطعم</th><th>السائق</th><th>الحالة</th><th>إجراء</th></tr>
                        </thead>
                        <tbody id="ordersTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-restaurants" class="admin-tab d-none">
                <h3>إدارة المطاعم</h3>
                <div id="resList" class="row"></div>
            </div>

            <div id="tab-drivers" class="admin-tab d-none">
                <h3>إدارة السواق</h3>
                <div id="driversList" class="row"></div>
            </div>
        </div>
    </div>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=visualization&callback=initMasterMap"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby7a-gZ44EKeTLJWHnayDvUhiWwKnX8eKZp8BudmWf7xaLLTVBnAdOSgtVa3DTJe9lUJA/exec";
    let map, heatmap;

    // الدخول باستخدام كلمة السر 223344 من الشيت
    function checkAuth() {
        const pass = document.getElementById('masterPass').value;
        if(pass === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('hidden-content');
            refreshData();
        } else {
            alert("كلمة المرور غير صحيحة!");
        }
    }

    function initMasterMap() {
        map = new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13,
            center: { lat: 35.468, lng: 44.392 }, // إحداثيات كركوك من الشيت
        });
    }

    function showTab(tabName) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.getElementById('tab-' + tabName).classList.remove('d-none');
    }

    function refreshData() {
        // جلب البيانات عبر JSONP لتخطي مشاكل الـ CORS في المتصفح
        const script = document.createElement('script');
        script.src = `${API_URL}?callback=handleResponse&action=getGlobalData`;
        document.body.appendChild(script);
    }

    // معالجة البيانات القادمة من Apps Script
    window.handleResponse = function(data) {
        // تحديث العدادات
        document.getElementById('count-orders').innerText = data.orders.length - 1;
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        // تحديث جدول الطلبات
        let orderHtml = '';
        data.orders.slice(1).forEach(order => {
            orderHtml += `<tr>
                <td>${order[1]}</td>
                <td>${order[2]}</td>
                <td>${order[7] || 'بحث...'}</td>
                <td><span class="badge bg-info">${order[6]}</span></td>
                <td><button class="btn btn-sm btn-danger">حذف</button></td>
            </tr>`;
        });
        document.getElementById('ordersTableBody').innerHTML = orderHtml;
    };

    setInterval(refreshData, 15000); // تحديث كل 15 ثانية
</script>
</body>
</html>
