<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيادة المطلقة | منظومة الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .master-font { font-family: 'Orbitron', sans-serif; }
        .status-badge { font-size: 9px; padding: 3px 10px; border-radius: 99px; font-weight: 900; text-transform: uppercase; }
        .btn-action { transition: all 0.2s; }
        .btn-action:active { transform: scale(0.9); }
    </style>
</head>
<body class="min-h-screen">

    <div id="lockScreen" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-950">
        <div class="max-w-md w-full glass p-10 rounded-[3rem] text-center border border-emerald-500/20 shadow-2xl">
            <div class="w-20 h-20 bg-emerald-500 rounded-3xl mx-auto flex items-center justify-center mb-8 animate-pulse text-slate-900 text-4xl font-black master-font">ح</div>
            <h1 class="text-2xl font-black mb-8 italic">غرفة العمليات المركزية</h1>
            <input type="password" id="adminPass" placeholder="رمز السيادة" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-center mb-6 focus:border-emerald-500 outline-none text-emerald-500 text-xl font-bold tracking-widest">
            <button onclick="unlockMaster()" class="w-full bg-emerald-500 text-slate-900 py-5 rounded-2xl font-black text-lg italic uppercase shadow-lg shadow-emerald-500/20">دخول السيادة 🔐</button>
        </div>
    </div>

    <div id="mainDashboard" class="hidden p-4 md:p-8 pb-24">
        
        <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center bg-slate-900/80 p-6 rounded-[2.5rem] border border-emerald-500/20 shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center font-black text-slate-900 text-3xl master-font">ح</div>
                <div>
                    <h1 class="text-2xl font-black text-white italic">السيادة المطلقة</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic">Whale HQ • Kirkuk Operational Center</p>
                </div>
            </div>
            <div class="flex gap-4 mt-6 md:mt-0">
                <button onclick="fetchData()" class="bg-emerald-500/20 text-emerald-400 px-6 py-3 rounded-2xl border border-emerald-500/30 font-black text-xs italic">تحديث الرادار 🔄</button>
                <button onclick="location.reload()" class="bg-red-500/10 text-red-500 p-4 rounded-2xl border border-red-500/20">خروج</button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto">
            <div class="flex flex-wrap gap-4 mb-10">
                <button onclick="showTab('orders')" id="btn-orders" class="tab-btn flex-1 bg-emerald-600 p-6 rounded-3xl font-black text-white text-lg italic shadow-lg">📡 الرادار الحي</button>
                <button onclick="showTab('approvals')" id="btn-approvals" class="tab-btn flex-1 glass p-6 rounded-3xl font-black text-amber-500 text-lg italic relative">
                    🔔 طلبات الانضمام <span id="reqCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-6 h-6 rounded-full flex items-center justify-center hidden">0</span>
                </button>
                <button onclick="showTab('restaurants')" id="btn-restaurants" class="tab-btn flex-1 glass p-6 rounded-3xl font-black text-emerald-500 text-lg italic">🏢 الإدارة المالية</button>
            </div>

            <div id="orders" class="tab-content active glass p-8 rounded-[3.5rem] border-t-4 border-emerald-500">
                <h2 class="text-2xl font-black text-emerald-400 italic mb-10 flex items-center gap-3"><span class="w-3 h-3 bg-emerald-500 rounded-full animate-ping"></span> مراقبة الطلبات</h2>
                <div id="ordersList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="approvals" class="tab-content glass p-8 rounded-[3.5rem] border-t-4 border-amber-500">
                <h2 class="text-2xl font-black text-amber-500 italic mb-10">الموافقة على الأعضاء الجدد</h2>
                <div id="pendingList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>

            <div id="restaurants" class="tab-content glass p-8 rounded-[3.5rem] border-t-4 border-red-500">
                <h2 class="text-2xl font-black text-red-500 italic mb-10 text-center uppercase tracking-widest">إدارة الشركاء والحسابات</h2>
                <div id="entitiesList" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </div>
        </main>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyYL0NRSg1V9xL62JyL5MQfP2jNO3sNU6lDl1xf_GcmOAZXWBg8G7YpdFdJjxpEDcpDhQ/exec';
        const MASTER_PASS = "112233";

        function unlockMaster() {
            if (document.getElementById('adminPass').value === MASTER_PASS) {
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
                fetchData();
                setInterval(fetchData, 20000); 
            } else { alert("رمز السيادة خاطئ!"); }
        }

        async function fetchData() {
            try {
                const response = await fetch(scriptURL + "?action=get_master_data");
                const data = await response.json();
                renderOrders(data.orders || []);
                renderEntities(data.restaurants || [], 'Restaurants', 'emerald');
                renderEntities(data.drivers || [], 'Drivers', 'red', true);
                renderPending(data.pending || []);
            } catch (e) { console.log("Offline Mode"); }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            container.innerHTML = orders.map(ord => `
                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/10 relative overflow-hidden">
                    <div class="flex justify-between mb-4">
                        <span class="text-emerald-500 font-mono text-[10px] font-bold">${ord.id}</span>
                        <span class="bg-blue-600 text-white status-badge italic">${ord.status}</span>
                    </div>
                    <h3 class="font-black italic text-lg text-white mb-4">${ord.restaurantName}</h3>
                    <div class="flex flex-col gap-2 mb-6">
                        <div class="text-[11px] text-gray-400 border-r-2 border-emerald-500 pr-2">${ord.details}</div>
                        <div class="text-[10px] text-emerald-400 italic">الكابتن: ${ord.driverPhone || '---'}</div>
                    </div>
                    <div class="flex gap-2">
                        ${ord.driverPhone ? `<button onclick="releaseOrder('${ord.id}')" class="flex-1 bg-amber-500/20 text-amber-500 py-2 rounded-xl text-[10px] font-black border border-amber-500/30">سحب الطلب 🔓</button>` : ''}
                        <button onclick="window.open('https://wa.me/${ord.driverPhone || ''}')" class="bg-emerald-500 text-slate-900 p-2 rounded-xl"><i class="fab fa-whatsapp"></i></button>
                    </div>
                </div>
            `).join('') || '<p class="col-span-full text-center opacity-30 italic">لا توجد طلبات نشطة</p>';
        }

        function renderEntities(items, type, color, append = false) {
            const container = document.getElementById('entitiesList');
            if (!append) container.innerHTML = "";
            container.innerHTML += items.map(item => `
                <div class="bg-slate-900/50 border border-white/5 p-8 rounded-[3rem] shadow-xl relative">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[9px] text-gray-500 uppercase font-black">${type === 'Drivers' ? 'كابتن ميداني' : 'شريك مطعم'}</span>
                            <h3 class="text-xl font-black text-white italic">${item.name}</h3>
                            <p class="text-[10px] text-gray-400 font-mono">${item.phone || ''}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-${color}-500 text-2xl font-black italic">${item.wallet} <span class="text-[10px]">د.ع</span></p>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mb-4">
                        <a href="tel:${item.phone}" class="bg-blue-500/20 text-blue-500 py-3 rounded-2xl flex items-center justify-center border border-blue-500/20"><i class="fas fa-phone"></i></a>
                        <a href="https://wa.me/${item.phone}" class="bg-emerald-500/20 text-emerald-500 py-3 rounded-2xl flex items-center justify-center border border-emerald-500/20"><i class="fab fa-whatsapp"></i></a>
                        <button onclick="banUser('${item.phone}', '${type}')" class="bg-red-500/20 text-red-500 py-3 rounded-2xl border border-red-500/20"><i class="fas fa-user-slash"></i></button>
                    </div>
                    <button onclick="clearWallet('${item.name}', '${type}')" class="w-full bg-${color}-500 text-slate-900 py-4 rounded-2xl font-black italic shadow-lg shadow-${color}-500/10">تسوية المحفظة 💰</button>
                </div>
            `).join('');
        }

        function renderPending(pending) {
            const container = document.getElementById('pendingList');
            const badge = document.getElementById('reqCount');
            if (pending.length > 0) {
                badge.innerText = pending.length; badge.classList.remove('hidden');
                container.innerHTML = pending.map(user => `
                    <div class="bg-amber-500/10 border border-amber-500/20 p-8 rounded-[2.5rem] flex flex-col items-center text-center">
                        <div class="text-amber-500 text-xs font-black uppercase mb-2">طلب انضمام ${user.type === 'Driver' ? 'كابتن' : 'مطعم'}</div>
                        <h4 class="text-xl font-black mb-1">${user.name}</h4>
                        <p class="font-mono text-gray-500 mb-6">${user.phone}</p>
                        <div class="flex gap-2 w-full">
                            <button onclick="approveUser('${user.phone}', '${user.type}')" class="flex-1 bg-amber-500 text-slate-900 py-4 rounded-2xl font-black italic">تفعيل ✅</button>
                            <button onclick="banUser('${user.phone}', '${user.type === 'Driver' ? 'Drivers' : 'Restaurants'}')" class="bg-red-500/20 text-red-500 p-4 rounded-2xl"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            } else { badge.classList.add('hidden'); container.innerHTML = '<p class="col-span-full opacity-30 text-center italic py-10">لا توجد طلبات انتظار</p>'; }
        }

        async function banUser(phone, type) {
            if(!confirm("تأكيد الحظر: هل تريد طرد هذا المستخدم نهائياً من المنظومة؟")) return;
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'ban_user', phone, type, pass: MASTER_PASS }) });
            if(res.ok) { alert("تم الحظر بنجاح!"); fetchData(); }
        }

        async function releaseOrder(orderID) {
            if(!confirm("هل تريد سحب الطلب من السائق وإعادته للرادار؟")) return;
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'release_order', orderID, pass: MASTER_PASS }) });
            if(res.ok) { fetchData(); }
        }

        // الوظائف السابقة (Approve, ClearWallet, ShowTab) تبقى كما هي
        async function approveUser(phone, type) {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'approve_user', phone, type, pass: MASTER_PASS }) });
            if(res.ok) { fetchData(); }
        }
        async function clearWallet(name, targetSheet) {
            if(!confirm("تصفير المحفظة؟")) return;
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: 'clear_wallet', name, targetSheet, pass: MASTER_PASS }) });
            if(res.ok) { fetchData(); }
        }
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.className = "tab-btn flex-1 glass p-6 rounded-3xl font-black text-emerald-500 text-lg italic");
            document.getElementById('btn-' + tabId).className = "tab-btn flex-1 bg-emerald-600 p-6 rounded-3xl font-black text-white text-lg italic shadow-lg";
        }
    </script>
</body>
</html>
