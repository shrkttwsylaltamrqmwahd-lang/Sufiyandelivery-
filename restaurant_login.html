<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطاعم | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* تأثيرات الرادار الخلفية */
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .scan-line { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(to bottom, transparent, var(--whale-emerald), transparent); animation: scan 8s linear infinite; opacity: 0.3; z-index: -1; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
        
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; color: white; transition: 0.4s; }
        .whale-input:focus { border-color: var(--whale-emerald); box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); outline: none; }
        
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); transition: 0.3s; cursor: pointer; }
        .action-btn:active { transform: scale(0.96); }
        
        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>
    <div class="scan-line"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-emerald-500 font-black tracking-[0.2em] italic uppercase">Authenticating Radar...</p>
        </div>

        <div id="authUI" class="hidden animate-fade">
            <header class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-emerald-500/10 border border-emerald-500/20 mb-4 shadow-2xl shadow-emerald-500/10">
                    <span class="text-4xl text-emerald-500"><i class="fas fa-utensils"></i></span>
                </div>
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-emerald-500">KITCHEN</span>
                </h2>
                <p id="subTitle" class="text-[9px] text-slate-500 mt-3 tracking-[0.2em] font-bold italic uppercase">نظام دخول شركاء الأغذية</p>
            </header>

            <form id="smartForm" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-id-card absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                    <input type="number" id="managerID" required placeholder="رقم هوية المدير" 
                           class="whale-input text-center font-black tracking-widest text-lg"
                           oninput="checkStatus(this.value)">
                </div>

                <div id="newFields" class="hidden space-y-4 border-t border-white/5 pt-6 animate-fade">
                    <div class="relative">
                        <i class="fas fa-store absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500/50"></i>
                        <input type="text" id="resName" placeholder="اسم المطعم" class="whale-input font-bold italic">
                    </div>
                    <div class="relative">
                        <i class="fab fa-whatsapp absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500/50"></i>
                        <input type="tel" id="resPhone" placeholder="رقم واتساب" class="whale-input font-mono tracking-widest italic" dir="ltr">
                    </div>
                    <div class="relative">
                        <i class="fas fa-map-marked-alt absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500/50"></i>
                        <input type="text" id="resLocation" placeholder="موقع المطعم (الحي)" class="whale-input font-bold italic">
                    </div>
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-6 flex items-center justify-center gap-3">
                    <span id="btnText">تفعيل الرادار</span>
                    <i class="fas fa-satellite-dish"></i>
                </button>
            </form>
        </div>

        <div id="waitMessage" class="hidden text-center py-12 animate-fade">
            <div class="text-6xl mb-6 drop-shadow-[0_0_15px_rgba(245,158,11,0.3)]">⏳</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase italic tracking-tighter">قيد المراجعة الأمنية</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">يتم الآن ربط مطعمك بمنظومة "الحوت" المركزية.<br>سيتم تفعيل اللوحة تلقائياً فور الموافقة.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500/70 underline font-black uppercase tracking-widest">Logout Session</button>
        </div>
    </div>

    <script>
        // محاكاة سريعة للبيانات
        const mockDB = [{ id: "123456789012", status: "active" }];

        window.onload = () => {
            const savedID = localStorage.getItem('whale_res_id');
            const savedStatus = localStorage.getItem('whale_res_status');

            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                if (savedID) {
                    if (savedStatus === 'active') {
                        alert("✅ الرادار نشط - جاري الدخول للوحة...");
                        // window.location.href = 'restaurant_dashboard.html';
                    } else {
                        document.getElementById('waitMessage').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('authUI').classList.remove('hidden');
                }
            }, 1500);
        };

        function checkStatus(val) {
            const extra = document.getElementById('newFields');
            const btnText = document.getElementById('btnText');
            const res = mockDB.find(r => r.id === val);

            if (res) {
                btnText.innerText = "دخول سريع";
                extra.classList.add('hidden');
            } else if (val.length >= 8) {
                extra.classList.remove('hidden');
                btnText.innerText = "تقديم طلب انضمام";
            }
        }

        document.getElementById('smartForm').onsubmit = function(e) {
            e.preventDefault();
            const id = document.getElementById('managerID').value;
            localStorage.setItem('whale_res_id', id);
            
            const res = mockDB.find(r => r.id === id);
            if (res && res.status === 'active') {
                localStorage.setItem('whale_res_status', 'active');
                location.reload();
            } else {
                localStorage.setItem('whale_res_status', 'pending');
                document.getElementById('authUI').classList.add('hidden');
                document.getElementById('waitMessage').classList.remove('hidden');
            }
        };

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
