<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة المطاعم | رادار الحوت 🐋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-navy: #020617; }
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .radar-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; }
        .glass-card { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .whale-input { width: 100%; padding: 1.1rem 3.5rem 1.1rem 1.1rem; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; color: white; outline: none; transition: 0.3s; }
        .whale-input:focus { border-color: var(--whale-emerald); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        .action-btn { background: var(--whale-emerald); color: #020617; font-weight: 900; clip-path: polygon(4% 0, 100% 0, 96% 100%, 0% 100%); transition: 0.3s; }
        .action-btn:active { transform: scale(0.95); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">

    <div class="radar-grid"></div>

    <div class="max-w-md w-full glass-card p-10 rounded-[2.5rem] relative z-10">
        
        <div id="loader" class="text-center py-12">
            <div class="w-14 h-14 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
            <p class="text-[10px] text-emerald-500 font-black italic uppercase">Linking Kitchen Radar...</p>
        </div>

        <div id="authUI" class="hidden">
            <header class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-emerald-500/10 border border-emerald-500/20 mb-4">
                    <span class="text-4xl text-emerald-500"><i class="fas fa-utensils"></i></span>
                </div>
                <h2 class="text-2xl font-black tracking-widest uppercase italic" style="font-family: 'Orbitron', sans-serif;">
                    WHALE <span class="text-emerald-500">KITCHEN</span>
                </h2>
            </header>

            <form id="smartForm" class="space-y-4 text-center">
                <div class="relative">
                    <i class="fas fa-store absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                    <input type="text" id="resName" required placeholder="اسم المطعم" 
                           class="whale-input text-center font-black tracking-tight text-lg">
                </div>

                <div id="regFields" class="hidden space-y-4 pt-2">
                    <div class="relative">
                        <i class="fas fa-phone absolute right-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
                        <input type="tel" id="resPhone" placeholder="رقم الهاتف للتواصل" 
                               class="whale-input text-center font-bold">
                    </div>
                </div>

                <button type="submit" id="mainBtn" class="w-full py-5 action-btn mt-6 flex items-center justify-center gap-3 italic">
                    <span id="btnText">تفعيل الدخول</span>
                    <i class="fas fa-satellite-dish"></i>
                </button>
            </form>
            <p class="text-[9px] text-center text-gray-500 mt-6 italic font-bold uppercase tracking-widest">Kirkuk Operational Sector</p>
        </div>

        <div id="waitMessage" class="hidden text-center py-12">
            <div class="text-6xl mb-6">⏳</div>
            <h3 class="text-xl font-black text-amber-500 italic uppercase">بانتظار الموافقة</h3>
            <p class="text-[10px] text-slate-400 mt-6 leading-relaxed italic">طلب انضمام مطعمك قيد المراجعة الآن.<br>سيتم التفعيل من قبل الإدارة فوراً.</p>
            <button onclick="logout()" class="mt-10 text-[9px] text-red-500/70 underline font-black">إعادة محاولة</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyYL0NRSg1V9xL62JyL5MQfP2jNO3sNU6lDl1xf_GcmOAZXWBg8G7YpdFdJjxpEDcpDhQ/exec';

        window.onload = () => {
            const savedStatus = localStorage.getItem('whale_res_status');
            const savedName = localStorage.getItem('whale_res_name');

            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                if (savedStatus === 'active' && savedName) {
                    window.location.href = 'restaurant.html';
                } else if (savedStatus === 'pending') {
                    document.getElementById('waitMessage').classList.remove('hidden');
                } else {
                    document.getElementById('authUI').classList.remove('hidden');
                }
            }, 1000);
        };

        document.getElementById('smartForm').onsubmit = async function(e) {
            e.preventDefault();
            const name = document.getElementById('resName').value;
            const phone = document.getElementById('resPhone').value;
            const btn = document.getElementById('mainBtn');
            const regFields = document.getElementById('regFields');
            
            btn.disabled = true;
            btn.innerText = "جاري الاتصال بالقاعدة... 📡";

            try {
                // إرسال طلب تسجيل أو دخول
                const response = await fetch(`${scriptURL}?action=restaurant_login&id=${encodeURIComponent(name)}&phone=${phone}`);
                const result = await response.json();

                if (result.status === 'active') {
                    localStorage.setItem('whale_res_name', result.name);
                    localStorage.setItem('whale_res_status', 'active');
                    window.location.href = 'restaurant.html';
                } else if (result.status === 'not_found' && regFields.classList.contains('hidden')) {
                    // المطعم غير مسجل، نطلب رقم الهاتف للتقديم
                    regFields.classList.remove('hidden');
                    document.getElementById('resPhone').required = true;
                    btn.disabled = false;
                    btn.innerText = "تقديم طلب انضمام";
                    alert("هذا المطعم غير مسجل. يرجى إدخال رقم الهاتف لتقديم طلب انضمام للإدارة.");
                } else {
                    // حالة الـ pending (سواء كان مسجل سابقاً أو سجل الآن)
                    localStorage.setItem('whale_res_status', 'pending');
                    localStorage.setItem('whale_res_name', name);
                    document.getElementById('authUI').classList.add('hidden');
                    document.getElementById('waitMessage').classList.remove('hidden');
                }
            } catch (e) {
                alert("فشل الاتصال بالرادار، تأكد من الإنترنت");
                btn.disabled = false;
                btn.innerText = "تفعيل الدخول";
            }
        };

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
