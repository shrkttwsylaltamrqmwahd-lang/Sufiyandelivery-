<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دخول الشركاء | منظومة الحوت 🐋 V10.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --whale-emerald: #10b981; --whale-dark: #020617; --whale-glass: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Tajawal', sans-serif; background: var(--whale-dark); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* خلفية الشبكة المتحركة */
        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; animation: move 20s linear infinite; }
        @keyframes move { from { background-position: 0 0; } to { background-position: 40px 40px; } }

        .login-card { background: var(--whale-glass); backdrop-filter: blur(20px); border-radius: 3.5rem; border: 1px solid rgba(16, 185, 129, 0.2); width: 100%; max-width: 420px; padding: 3rem; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 20px rgba(16, 185, 129, 0.1); }
        
        .whale-input { width: 100%; padding: 1.2rem; background: rgba(2, 6, 23, 0.8); border: 2px solid rgba(16, 185, 129, 0.1); border-radius: 1.8rem; font-weight: 700; text-align: center; transition: 0.4s; color: white; outline: none; }
        .whale-input:focus { border-color: var(--whale-emerald); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }

        .btn-emerald { background: linear-gradient(135deg, #10b981, #059669); color: #020617; font-weight: 900; border-radius: 1.8rem; transition: 0.4s; border: none; cursor: pointer; text-transform: uppercase; font-style: italic; }
        .btn-emerald:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
        .btn-emerald:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .loading-orbit { position: relative; width: 60px; height: 60px; margin: 0 auto; border: 3px solid rgba(16, 185, 129, 0.1); border-radius: 50%; border-top-color: var(--whale-emerald); animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6">
    <div class="grid-bg"></div>

    <div class="login-card">
        <div class="text-center mb-10">
            <div class="relative inline-block">
                <div class="w-24 h-24 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center text-slate-900 text-5xl mx-auto mb-4 shadow-[0_0_30px_rgba(16,185,129,0.4)] rotate-3 hover:rotate-0 transition-transform duration-500">
                    <i class="fas fa-utensils"></i>
                </div>
                <div class="absolute -top-2 -right-2 w-8 h-8 bg-white rounded-full flex items-center justify-center text-emerald-600 shadow-lg animate-bounce">
                    <i class="fas fa-check text-xs"></i>
                </div>
            </div>
            <h2 class="text-3xl font-black text-white italic" style="font-family: 'Orbitron'; tracking-widest">WHALE <span class="text-emerald-500">KITCHEN</span></h2>
            <p class="text-[10px] text-emerald-500/60 font-black tracking-[0.4em] mt-2 uppercase italic">Kirkuk Logistics Network</p>
        </div>

        <div id="step-auth" class="space-y-6 fade-in">
            <div class="relative">
                <input type="tel" id="mainPhone" placeholder="077XXXXXXXX" class="whale-input text-2xl tracking-[0.2em]" dir="ltr">
            </div>
            <button onclick="handleLogin()" id="loginBtn" class="w-full py-5 btn-emerald flex items-center justify-center gap-4 group">
                <span id="loginBtnText" class="text-lg">دخول النظام</span>
                <i class="fas fa-satellite-dish group-hover:animate-pulse"></i>
            </button>
        </div>

        <div id="step-register" class="hidden space-y-4 fade-in">
            <div class="bg-emerald-500/10 p-4 rounded-2xl mb-2 border border-emerald-500/20 text-center">
                <p class="text-[10px] text-emerald-400 font-black uppercase tracking-widest">طلب انضمام جديد للرادار</p>
            </div>
            <input type="text" id="resName" placeholder="اسم المطعم أو الكافيه" class="whale-input italic">
            <div class="relative">
                <select id="resArea" class="whale-input cursor-pointer appearance-none italic">
                    <option value="" disabled selected>اختر منطقة المطعم</option>
                    <option value="الماس">الماس</option>
                    <option value="طريق بغداد">طريق بغداد</option>
                    <option value="التسعين">التسعين</option>
                    <option value="قورية">قورية</option>
                    <option value="الواسطي">حي الواسطي</option>
                    <option value="عرفه">عرفه</option>
                    <option value="غرناطة">غرناطة</option>
                </select>
                <i class="fas fa-chevron-down absolute left-5 top-1/2 -translate-y-1/2 text-emerald-500 pointer-events-none"></i>
            </div>
            <input type="url" id="resMapLink" placeholder="رابط الموقع (اختياري)" class="whale-input text-xs italic">
            
            <button onclick="submitNewRegistration()" id="regBtn" class="w-full py-5 btn-emerald mt-4 text-lg">إرسال الطلب للرادار</button>
            <button onclick="location.reload()" class="w-full text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mt-4 hover:text-emerald-400 transition-all">العودة للرئيسية</button>
        </div>

        <div id="step-wait" class="hidden text-center py-8 fade-in">
            <div class="loading-orbit mb-8"></div>
            <h3 class="text-2xl font-black text-white italic uppercase mb-2">Syncing Signal</h3>
            <p class="text-sm text-slate-400 leading-relaxed font-bold italic px-4">
                طلبك قيد المراجعة في سيرفر الحوت الرئيسي.<br>
                <span class="text-emerald-500/80">سيتم فتح لوحة التحكم تلقائياً فور تفعيل طه لحسابك.</span>
            </p>
            
            <div class="mt-12 p-5 bg-emerald-500/5 rounded-3xl border border-dashed border-emerald-500/20">
                <p class="text-[9px] text-slate-500 font-black uppercase tracking-widest mb-1">Technical Support</p>
                <p class="text-emerald-500 font-black tracking-widest">+964 771 322 5471</p>
            </div>

            <button onclick="logout()" class="mt-8 text-red-400 text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 mx-auto hover:text-red-300">
                <i class="fas fa-edit"></i> تعديل بيانات الطلب
            </button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzywi3-mLv5H4bNHYvQbFDpy_FwA-AceD4g8JZX6Ah3QZhmC5LGXNLvBeQBjYO9tmt9vA/exec';
        let checkInterval = null;

        window.onload = () => {
            const savedPhone = localStorage.getItem('whale_res_phone');
            if (savedPhone) {
                document.getElementById('mainPhone').value = savedPhone;
                handleLogin(true);
            }
        };

        async function handleLogin(isAuto = false) {
            const phone = document.getElementById('mainPhone').value.trim();
            if (!phone || phone.length < 10) return;

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            
            if(!isAuto) { 
                btn.disabled = true; 
                btnText.innerText = "Syncing..."; 
            }

            try {
                const response = await fetch(`${scriptURL}?action=login_check&id=${encodeURIComponent(phone)}`);
                const res = await response.json();

                if (res.status === 'active') {
                    localStorage.setItem('whale_res_phone', phone);
                    localStorage.setItem('whale_res_name', res.data[1]);
                    window.location.replace('Restaurant.html');
                } else if (res.status === 'pending') {
                    localStorage.setItem('whale_res_phone', phone);
                    showStep('step-wait');
                    startAutoCheck();
                } else if (res.status === 'banned') {
                    alert("عذراً، الوصول مقيد حالياً لهذا الحساب.");
                    if(!isAuto) location.reload();
                } else {
                    if(!isAuto) showStep('step-register');
                }
            } catch (e) {
                if(!isAuto) { 
                    alert("خطأ في الاتصال بالسيرفر"); 
                    btn.disabled = false; 
                    btnText.innerText = "دخول النظام"; 
                }
            }
        }

        async function submitNewRegistration() {
            const phone = document.getElementById('mainPhone').value.trim();
            const name = document.getElementById('resName').value.trim();
            const area = document.getElementById('resArea').value;
            const mapLink = document.getElementById('resMapLink').value.trim();
            const btn = document.getElementById('regBtn');

            if (!name || !area) return alert("يرجى إكمال البيانات الأساسية");

            btn.disabled = true;
            btn.innerText = "جاري إرسال الإشارة...";

            try {
                const response = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({
                        action: "register_user",
                        type: "Restaurant",
                        name: name,
                        phone: phone,
                        address: `${area} | ${mapLink}`,
                        fee: "1000",
                        lat: "0", lng: "0"
                    }) 
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    localStorage.setItem('whale_res_phone', phone);
                    showStep('step-wait');
                    startAutoCheck();
                }
            } catch (e) { 
                alert("فشل الإرسال، حاول مرة أخرى"); 
                btn.disabled = false; 
                btn.innerText = "إرسال الطلب للرادار";
            }
        }

        function showStep(stepId) {
            document.querySelectorAll('.login-card > div:not(:first-child)').forEach(div => div.classList.add('hidden'));
            document.getElementById(stepId).classList.remove('hidden');
        }

        function startAutoCheck() {
            if (!checkInterval) checkInterval = setInterval(() => handleLogin(true), 10000);
        }

        function logout() {
            clearInterval(checkInterval);
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
