<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body { background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1001; transition: transform 0.3s ease;
        }
        
        .main-content { margin-right: var(--sidebar-width); padding: 30px; min-height: 100vh; transition: margin 0.3s ease; }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); color: white; }

        .stat-widget {
            background: white; border-radius: 25px; padding: 25px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
        }

        #adminMap { height: 450px; width: 100%; border-radius: 30px; border: 8px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .smart-order-card {
            background: white; border-radius: 20px; padding: 22px; margin-bottom: 20px;
            border: 1px solid #e2e8f0; border-right: 8px solid #94a3b8;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); position: relative;
        }
        .status-danger { border-right-color: var(--danger); } 
        .status-warning { border-right-color: var(--warning); }
        .status-success { border-right-color: var(--success); }
        
        .delay-badge {
            position: absolute; top: -12px; left: 20px; background: var(--danger); color: white;
            padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 900;
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .info-row {
            display: flex; justify-content: space-between; align-items: center; 
            background: #f8fafc; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px;
            border: 1px solid #f1f5f9;
        }

        .sov-btn {
            border: none; border-radius: 12px; width: 38px; height: 38px; 
            display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .sov-call { background: #e0f2fe; color: #0369a1; }
        .sov-delete { background: #fee2e2; color: #ef4444; }

        /* تعديلات الموبايل والزر */
        .menu-toggle {
            display: none; position: fixed; bottom: 25px; left: 25px; 
            width: 65px; height: 65px; background: var(--accent-orange);
            color: white; border-radius: 50%; border: none; z-index: 2000;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
            align-items: center; justify-content: center;
        }

        @media (max-width: 1100px) {
            .menu-toggle { display: flex; }
            .sidebar { transform: translateX(100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-right: 0; padding: 20px; }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield-check" size="60" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">نظام الحوت | القيادة العليا</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور" onkeypress="if(event.key === 'Enter') checkAuth()">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">دخول السيادة</button>
    </div>
</div>

<button class="menu-toggle" onclick="toggleSidebar()">
    <i data-lucide="menu"></i>
</button>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">مركز الحوت</h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الميداني</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>الأرشيف الإداري</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>تحكم المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>تحكم الأسطول</span></div>
        </nav>
        <div style="position: absolute; bottom: 30px; width: calc(100% - 30px);">
            <div class="nav-item text-danger" onclick="location.reload()"><i data-lucide="log-out"></i> <span>تسجيل خروج</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div><h2 class="fw-black m-0">لوحة القيادة والسيادة</h2><p class="text-muted m-0">كركوك - بث مباشر للعمليات</p></div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border text-primary">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="row g-4 mb-4">
                <div class="col-md-4"><div class="stat-widget"><div><small class="fw-bold text-muted">إجمالي الطلبات</small><h2 id="count-orders" class="fw-black m-0">0</h2></div><i data-lucide="package" class="text-primary"></i></div></div>
                <div class="col-md-4"><div class="stat-widget"><div><small class="fw-bold text-muted">أسطول نشط</small><h2 id="count-drivers" class="fw-black m-0 text-success">0</h2></div><i data-lucide="truck" class="text-success"></i></div></div>
                <div class="col-md-4"><div class="stat-widget"><div><small class="fw-bold text-muted">شركاء الخدمة</small><h2 id="count-res" class="fw-black m-0 text-warning">0</h2></div><i data-lucide="store" class="text-warning"></i></div></div>
            </div>
            <div id="adminMap"></div>
            <div class="mt-5">
                <h4 class="fw-black mb-4 d-flex align-items-center gap-2 border-bottom pb-3"><i data-lucide="activity" class="text-danger"></i> رادار الطلبات النشطة</h4>
                <div class="row g-4" id="smartRadarContainer"></div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="stat-widget table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>المطعم</th><th>السائق</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
        </div>
        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    const API_TOKEN = "HUT_SECURE_99";

    function checkAuth() {
        if(document.getElementById('masterPass').value === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock(); refreshData(); setInterval(refreshData, 15000);
        } else { alert("❌ رمز الدخول السيادي خاطئ!"); }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('show');
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        document.getElementById('count-orders').innerText = data.orders.length - 1;
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        let radarHtml = '';
        const activeOrders = data.orders.slice(1).filter(o => o[6] !== 'completed' && o[6] !== 'مكتمل').reverse();
        activeOrders.forEach(o => {
            const hasDriver = !!o[7];
            const isPicked = (o[6] === 'picked_up' || o[6] === 'في الطريق');
            const diffMins = Math.floor((new Date() - new Date(o[0])) / 60000);
            const isDelayed = diffMins > 30;
            let cardClass = !hasDriver ? 'status-danger' : (isPicked ? 'status-success' : 'status-warning');
            radarHtml += `<div class="col-xl-6"><div class="smart-order-card ${cardClass}">${isDelayed ? `<div class="delay-badge">تأخير: ${diffMins} دقيقة</div>` : ''}<div class="info-row"><span>#${o[1]} - ${o[3]}</span> <button class="sov-btn sov-call" onclick="window.open('tel:${o[4]}')"><i data-lucide="phone" size="14"></i></button></div></div></div>`;
        });
        document.getElementById('smartRadarContainer').innerHTML = radarHtml || '<p class="text-center p-4">لا توجد طلبات معلقة</p>';
        lucide.createIcons();
    };

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        if(window.innerWidth < 1100) toggleSidebar();
        lucide.createIcons();
    }
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMap"></script>
<script>function initMap() { new google.maps.Map(document.getElementById("adminMap"), {zoom: 13, center: { lat: 35.468, lng: 44.392 }, disableDefaultUI: true}); }</script>
</body>
</html>
