<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }

        /* شاشة القفل المحسنة */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        /* الهيكل الجانبي */
        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1001; transition: transform 0.3s ease;
        }
        
        .main-content { 
            margin-right: var(--sidebar-width); 
            padding: 30px; 
            min-height: 100vh; 
            transition: margin 0.3s ease;
        }

        /* قائمة التنقل */
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); }

        /* الكروت والويدجت */
        .stat-widget {
            background: white; border-radius: 25px; padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
            height: 100%; transition: 0.3s;
        }
        .icon-shape { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }

        /* خريطة ذكية */
        #adminMap { 
            height: 500px; width: 100%; border-radius: 30px; 
            border: 10px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* جداول مستجيبة */
        .custom-table-card { 
            background: white; border-radius: 30px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
        }
        .table thead th { background: #f8fafc; border: none; padding: 20px; font-weight: 700; color: #64748b; }
        .table tbody td { padding: 20px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }

        .badge-status { padding: 6px 14px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); }
            .menu-toggle { display: block !important; }
        }

        .menu-toggle {
            display: none; position: fixed; bottom: 20px; left: 20px; 
            width: 60px; height: 60px; background: var(--accent-orange);
            color: white; border-radius: 50%; border: none; z-index: 2000;
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.4);
        }

        /* --- أزرار السيادة الجديدة --- */
        .sov-btn {
            border: none; border-radius: 10px; width: 35px; height: 35px; 
            display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer;
        }
        .sov-accept { background: #dcfce7; color: #166534; }
        .sov-accept:hover { background: #166534; color: white; }
        .sov-pause { background: #fef9c3; color: #854d0e; }
        .sov-pause:hover { background: #ca8a04; color: white; }
        .sov-delete { background: #fee2e2; color: #ef4444; }
        .sov-delete:hover { background: #ef4444; color: white; }
        .sov-call { background: #e0f2fe; color: #0369a1; }
        .sov-call:hover { background: #0369a1; color: white; }

        /* --- كروت الطلبات الذكية --- */
        .smart-order-card {
            background: white; border-radius: 20px; padding: 20px;
            border: 1px solid #e2e8f0; border-right: 6px solid #94a3b8;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); position: relative;
        }
        .status-no-driver { border-right-color: #ef4444; } /* أحمر: لا يوجد سائق أو تأخير */
        .status-processing { border-right-color: #f59e0b; } /* برتقالي: جاري التجهيز */
        .status-delivering { border-right-color: #10b981; } /* أخضر: في الطريق */
        
        .smart-delay-badge {
            position: absolute; top: -10px; left: 20px; background: #ef4444; color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3); animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .contact-pill {
            display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 8px 12px;
            border-radius: 12px; border: 1px solid #e2e8f0; font-size: 0.85rem; font-weight: bold;
        }
        .btn-mini-action {
            background: none; border: none; padding: 4px; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .btn-mini-action:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield" size="50" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">تسجيل دخول المسؤول</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور السيادية">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">فتح بروتوكول القيادة</button>
    </div>
</div>

<button class="menu-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">نظام الحوت</h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الحي والميدان</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>سجل الطلبات</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>المطاعم (تحكم)</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>الأسطول (تحكم)</span></div>
        </nav>
        <div style="position: absolute; bottom: 30px; width: calc(100% - 30px);">
            <div class="nav-item text-danger" onclick="location.reload()"><i data-lucide="log-out"></i> <span>إغلاق النظام</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h2 class="fw-black m-0">لوحة القيادة</h2>
                <p class="text-muted m-0">متابعة الأسطول - كركوك</p>
            </div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="custom-table-card mb-4 d-flex flex-wrap align-items-center gap-3">
                <div class="bg-primary bg-opacity-10 p-2 rounded-circle text-primary"><i data-lucide="megaphone"></i></div>
                <h6 class="m-0 fw-bold">بث أمر للأسطول:</h6>
                <input type="text" id="adminMsg" class="form-control bg-light border-0 rounded-pill px-4 flex-grow-1 shadow-none" placeholder="اكتب التعليمات لتظهر فوراً لدى جميع الكباتن...">
                <button class="btn btn-dark rounded-pill px-4 fw-bold" onclick="sendBroadcast()">إرسال الأمر</button>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-xl-4 col-md-6">
                    <div class="stat-widget d-flex justify-content-between align-items-center">
                        <div><small class="text-muted fw-bold">إجمالي الطلبات</small><h2 class="fw-black m-0" id="count-orders">0</h2></div>
                        <div class="icon-shape bg-primary bg-opacity-10 text-primary"><i data-lucide="package"></i></div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-6">
                    <div class="stat-widget d-flex justify-content-between align-items-center">
                        <div><small class="text-muted fw-bold">كابتن نشط</small><h2 class="fw-black m-0 text-success" id="count-drivers">0</h2></div>
                        <div class="icon-shape bg-success bg-opacity-10 text-success"><i data-lucide="navigation"></i></div>
                    </div>
                </div>
                <div class="col-xl-4 col-md-12">
                    <div class="stat-widget d-flex justify-content-between align-items-center">
                        <div><small class="text-muted fw-bold">شركاء المطاعم</small><h2 class="fw-black m-0 text-warning" id="count-res">0</h2></div>
                        <div class="icon-shape bg-warning bg-opacity-10 text-warning"><i data-lucide="store"></i></div>
                    </div>
                </div>
            </div>
            
            <div id="adminMap"></div>

            <div class="mt-5">
                <h4 class="fw-black mb-4 d-flex align-items-center gap-2">
                    <i data-lucide="activity" class="text-danger"></i> الطلبات الميدانية النشطة
                </h4>
                <div class="row g-4" id="smartOrdersContainer">
                    </div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="custom-table-card table-responsive">
                <table class="table align-middle m-0">
                    <thead>
                        <tr><th>ID</th><th>المطعم</th><th>الكابتن</th><th>المنطقة</th><th>الحالة</th><th>إجراء سيادي</th></tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?libraries=visualization&callback=initMasterMap"></script>
<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    const API_TOKEN = "HUT_SECURE_99";
    
    let map, heatmap, markers = [];

    function checkAuth() {
        if(document.getElementById('masterPass').value === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock(); refreshData(); setInterval(refreshData, 15000);
        } else { alert("رمز خاطئ!"); }
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        if(window.innerWidth < 1100) toggleSidebar();
        lucide.createIcons();
    }

    function initMasterMap() {
        map = new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, center: { lat: 35.468, lng: 44.392 }, disableDefaultUI: true
        });
        heatmap = new google.maps.visualization.HeatmapLayer({ data: [], map: map, radius: 45, opacity: 0.8 });
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        document.getElementById('count-orders').innerText = (data.orders.length - 1);
        document.getElementById('count-drivers').innerText = data.drivers.filter(d => d[4] === 'active').length;
        document.getElementById('count-res').innerText = data.restaurants.filter(r => r[4] === 'active').length;

        // 1. جداول الطلبات العادية
        let oHtml = '';
        let heatPoints = [];
        let activeOrdersData = []; // لجمع الطلبات النشطة لعرضها أسفل الخريطة

        data.orders.slice(1).reverse().forEach(o => {
            const isCompleted = o[6] === 'completed' || o[6] === 'مكتمل';
            
            // إضافة للجدول العام
            oHtml += `<tr>
                <td><strong class="text-primary">#${o[1]}</strong></td>
                <td>${o[2]}</td>
                <td>${o[7] || '<span class="text-muted small">بدون سائق</span>'}</td>
                <td>${o[9]}</td>
                <td><span class="badge-status ${o[6]==='pending'?'bg-warning text-dark':'bg-success text-white'}">${o[6]}</span></td>
                <td>
                    <button class="sov-btn sov-delete" onclick="adminAction('DELETE_ORDER', '${o[1]}')" title="حذف/إلغاء الطلب"><i data-lucide="trash-2" size="16"></i></button>
                </td>
            </tr>`;
            
            if(o[10] && o[11]) heatPoints.push(new google.maps.LatLng(parseFloat(o[10]), parseFloat(o[11])));
            
            // جمع الطلبات غير المكتملة لعرضها في الرصد الذكي
            if(!isCompleted) activeOrdersData.push(o);
        });
        document.getElementById('ordersTableBody').innerHTML = oHtml;

        // 2. تحديث الخريطة
        if(heatmap) heatmap.setData(heatPoints);
        updateMapMarkers(data.drivers, data.restaurants);

        // 3. كروت التحكم (المطاعم والكباتن) مع أزرار السيادة
        renderControlCards('resListContainer', data.restaurants, 'store', 'RESTAURANT');
        renderControlCards('driverListContainer', data.drivers, 'user', 'DRIVER');

        // 4. رسم الطلبات الميدانية النشطة أسفل الخريطة
        renderSmartOrders(activeOrdersData);
    };

    function renderControlCards(id, list, icon, type) {
        let html = '';
        list.slice(1).forEach(i => {
            const isActive = i[4] === 'active';
            html += `<div class="col-md-6 col-xl-4"><div class="stat-widget flex-column align-items-stretch">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="icon-shape bg-light"><i data-lucide="${icon}"></i></div>
                    <div class="flex-grow-1"><h6 class="m-0 fw-bold">${i[1]}</h6><small class="text-muted">${i[2]}</small></div>
                    <span class="badge-status ${isActive ? 'bg-success' : 'bg-secondary'} text-white">${i[4]}</span>
                </div>
                <div class="d-flex justify-content-between align-items-center border-top pt-3 mt-1">
                    <div class="d-flex gap-2">
                        <button class="sov-btn sov-accept" onclick="adminAction('ACCEPT', '${type}', '${i[2]}')" title="قبول الانضمام/تفعيل"><i data-lucide="check-circle" size="18"></i></button>
                        <button class="sov-btn sov-pause" onclick="adminAction('PAUSE', '${type}', '${i[2]}')" title="إيقاف مؤقت"><i data-lucide="pause-circle" size="18"></i></button>
                        <button class="sov-btn sov-delete" onclick="adminAction('DELETE', '${type}', '${i[2]}')" title="حذف نهائي"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                    <button class="sov-btn sov-call" onclick="window.open('tel:${i[3] || ''}')" title="اتصال سريع"><i data-lucide="phone-call" size="18"></i></button>
                </div>
            </div></div>`;
        });
        document.getElementById(id).innerHTML = html;
        lucide.createIcons();
    }

    function renderSmartOrders(activeOrders) {
        let html = '';
        const now = new Date();

        activeOrders.forEach(o => {
            // تحليل ذكي للحالة
            let hasDriver = o[7] ? true : false;
            let statusText = "";
            let cardClass = "";
            let isDelayed = false;

            // افتراض أن o[0] يحتوي على وقت الطلب
            let orderTime = new Date(o[0]); 
            let diffMins = Math.floor((now - orderTime) / 60000);
            
            if(diffMins > 45) isDelayed = true; // تأخير إذا تجاوز 45 دقيقة

            if(!hasDriver) {
                statusText = "جاري البحث عن كابتن";
                cardClass = "status-no-driver";
            } else if(o[6] === 'picked_up' || o[6] === 'في الطريق') {
                statusText = "استلم الطلب وفي الطريق للزبون";
                cardClass = "status-delivering";
            } else {
                statusText = "السائق متوجه للمطعم للتجهيز";
                cardClass = "status-processing";
            }

            html += `
            <div class="col-xl-6">
                <div class="smart-order-card ${cardClass}">
                    ${isDelayed ? `<div class="smart-delay-badge">تأخير! مر ${diffMins} دقيقة</div>` : ''}
                    
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h5 class="fw-black m-0">طلب #${o[1]}</h5>
                            <small class="text-muted fw-bold">${statusText}</small>
                        </div>
                        <button class="btn btn-sm btn-dark rounded-pill px-3 fw-bold shadow-sm d-flex align-items-center gap-1" onclick="trackOrder('${o[1]}')">
                            <i data-lucide="map-pin" size="14"></i> تتبع الكابتن
                        </button>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <div class="contact-pill">
                            <i data-lucide="user" size="16" class="text-muted"></i> 
                            <span>الزبون: ${o[3] || 'غير متوفر'}</span>
                            <button class="btn-mini-action text-primary" onclick="window.open('tel:${o[4] || ''}')" title="اتصال بالزبون"><i data-lucide="phone" size="14"></i></button>
                        </div>
                        <div class="contact-pill">
                            <i data-lucide="store" size="16" class="text-muted"></i> 
                            <span>المجهز: ${o[2]}</span>
