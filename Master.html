<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>مركز قيادة الحوت | Al-Hut Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-dark: #0f172a;
            --accent-orange: #f97316;
            --bg-light: #f1f5f9;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body { background-color: var(--bg-light); font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شاشة القفل */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); text-align: center;
        }

        .sidebar {
            width: var(--sidebar-width); background: var(--primary-dark);
            height: 100vh; position: fixed; right: 0; top: 0; color: white; 
            padding: 25px 15px; z-index: 1001; transition: transform 0.3s ease;
        }
        
        .main-content { margin-right: var(--sidebar-width); padding: 30px; min-height: 100vh; transition: margin 0.3s ease; }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #94a3b8;
            text-decoration: none; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { background: #1e293b; color: white; }
        .nav-item.active { border-right: 5px solid var(--accent-orange); background: rgba(249, 115, 22, 0.1); }

        .stat-widget {
            background: white; border-radius: 25px; padding: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0;
        }

        #adminMap { height: 450px; width: 100%; border-radius: 30px; border: 8px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* --- كروت الرصد الذكي (الطلبات النشطة) --- */
        .order-monitor-card {
            background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; border-right: 6px solid #cbd5e1;
            transition: 0.3s;
        }
        .order-monitor-card.delayed { border-right-color: var(--danger); animation: glow-red 2s infinite; }
        .order-monitor-card.assigned { border-right-color: var(--warning); }
        .order-monitor-card.picked-up { border-right-color: var(--success); }

        @keyframes glow-red { 0% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.1); } 50% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); } 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.1); } }

        .info-pill { background: #f8fafc; padding: 6px 12px; border-radius: 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; border: 1px solid #f1f5f9; }
        
        /* --- أزرار السيادة --- */
        .sov-btn {
            width: 38px; height: 38px; border-radius: 10px; border: none; 
            display: inline-flex; align-items: center; justify-content: center; 
            transition: 0.2s; cursor: pointer;
        }
        .sov-btn.delete { background: #fee2e2; color: #ef4444; }
        .sov-btn.pause { background: #fef9c3; color: #854d0e; }
        .sov-btn.accept { background: #dcfce7; color: #166534; }
        .sov-btn:hover { transform: scale(1.1); filter: brightness(0.9); }

        .contact-btn { background: #e0f2fe; color: #0369a1; border: none; border-radius: 8px; padding: 4px 10px; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 1100px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; padding: 20px; }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="auth-card">
        <div class="mb-4"><i data-lucide="shield-check" size="60" color="#f97316"></i></div>
        <h4 class="fw-black mb-3">دخول السيادة | نظام الحوت</h4>
        <input type="password" id="masterPass" class="form-control form-control-lg text-center mb-3 shadow-none border-2" placeholder="كلمة المرور" onkeypress="if(event.key === 'Enter') checkAuth()">
        <button class="btn btn-dark w-100 py-3 fw-bold rounded-4" onclick="checkAuth()">فتح بروتوكول القيادة</button>
    </div>
</div>

<div class="d-none" id="mainDashboard">
    <aside class="sidebar" id="sidebar">
        <div class="d-flex align-items-center gap-3 mb-5 px-3">
            <div class="bg-warning p-2 rounded-3"><i data-lucide="waves" color="#0f172a"></i></div>
            <h4 class="m-0 fw-black">مركز الحوت</h4>
        </div>
        <nav>
            <div class="nav-item active" onclick="showTab(event, 'live')"><i data-lucide="radar"></i> <span>الرصد الميداني</span></div>
            <div class="nav-item" onclick="showTab(event, 'orders')"><i data-lucide="shopping-bag"></i> <span>الأرشيف</span></div>
            <div class="nav-item" onclick="showTab(event, 'restaurants')"><i data-lucide="store"></i> <span>المطاعم</span></div>
            <div class="nav-item" onclick="showTab(event, 'drivers')"><i data-lucide="user-check"></i> <span>الكباتن</span></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div><h2 class="fw-black m-0">لوحة القيادة والسيادة</h2><p class="text-muted m-0">كركوك - بث حي ومباشر</p></div>
            <div id="liveTime" class="bg-white px-4 py-2 rounded-pill shadow-sm fw-bold border">00:00:00</div>
        </header>

        <div id="tab-live" class="admin-tab">
            <div class="stat-widget mb-4 d-flex align-items-center gap-3">
                <input type="text" id="adminMsg" class="form-control border-0 bg-light rounded-pill px-4 shadow-none" placeholder="بث أمر فوري لجميع الكباتن...">
                <button class="btn btn-dark rounded-pill px-4" onclick="sendBroadcast()">إرسال</button>
            </div>

            <div id="adminMap"></div>

            <div class="mt-4">
                <h4 class="fw-black mb-3 d-flex align-items-center gap-2"><i data-lucide="activity" class="text-danger"></i> رادار الطلبات الحالية</h4>
                <div class="row g-3" id="activeOrdersRadar">
                    <div class="text-center p-5 text-muted">جاري مسح الميدان بحثاً عن طلبات نشطة...</div>
                </div>
            </div>
        </div>

        <div id="tab-orders" class="admin-tab d-none">
            <div class="stat-widget table-responsive"><table class="table align-middle"><thead><tr><th>ID</th><th>المطعم</th><th>الحالة</th><th>إجراء</th></tr></thead><tbody id="ordersTableBody"></tbody></table></div>
        </div>
        <div id="tab-restaurants" class="admin-tab d-none"><div class="row g-4" id="resListContainer"></div></div>
        <div id="tab-drivers" class="admin-tab d-none"><div class="row g-4" id="driverListContainer"></div></div>
    </main>
</div>

<script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbwIELSbF-1Fioo5mTwhsJw4jZ3MRcAgOY5G43ma1vDu6OkOHvItLH3HOOCSZAguWd0Ssw/exec";
    const API_TOKEN = "HUT_SECURE_99";

    function checkAuth() {
        if(document.getElementById('masterPass').value === "223344") {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').classList.remove('d-none');
            startClock(); refreshData(); setInterval(refreshData, 20000);
        } else { alert("❌ رمز الدخول السيادي خاطئ!"); }
    }

    function startClock() { setInterval(() => { document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('ar-EG'); }, 1000); }

    function refreshData() {
        const script = document.createElement('script');
        script.src = `${API_URL}?action=getGlobalData&callback=renderData&ts=${Date.now()}`;
        document.body.appendChild(script);
    }

    window.renderData = function(data) {
        // 1. معالجة رادار الطلبات النشطة
        let radarHtml = '';
        const activeOrders = data.orders.slice(1).filter(o => o[6] !== 'completed');

        activeOrders.forEach(o => {
            const hasDriver = o[7] ? true : false;
            const isPickedUp = (o[6] === 'picked_up' || o[6] === 'في الطريق');
            const startTime = new Date(o[0]);
            const diffMins = Math.floor((new Date() - startTime) / 60000);
            const isDelayed = diffMins > 35;

            let cardClass = isDelayed ? 'delayed' : (isPickedUp ? 'picked-up' : (hasDriver ? 'assigned' : ''));
            let statusText = isPickedUp ? 'استلم وفي الطريق' : (hasDriver ? 'تم التعيين - متوجه للمطعم' : 'بانتظار قبول سائق');

            radarHtml += `
            <div class="col-xl-6">
                <div class="order-monitor-card ${cardClass}">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div><h6 class="fw-black m-0">طلب #${o[1]} - ${o[2]}</h6><small class="fw-bold ${isDelayed?'text-danger':''}">${statusText} (${diffMins} د)</small></div>
                        ${hasDriver ? `<button class="btn btn-sm btn-dark rounded-pill px-3" onclick="trackDriver('${o[7]}')">تتبع 📍</button>` : ''}
                    </div>
                    <div class="d-flex flex-wrap gap-2 mb-2">
                        <div class="info-pill"><i data-lucide="user" size="14"></i> ${o[3]} <button class="contact-btn" onclick="window.open('tel:${o[4]}')">اتصال</button></div>
                        <div class="info-pill"><i data-lucide="store" size="14"></i> ${o[2]}</div>
                        <div class="info-pill"><i data-lucide="bike" size="14"></i> ${o[7] || 'لم يحدد'} ${hasDriver?`<button class="contact-btn" onclick="window.open('tel:${o[8]}')">اتصال</button>`:''}</div>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById('activeOrdersRadar').innerHTML = radarHtml || '<div class="text-center p-4">لا توجد طلبات نشطة حالياً.</div>';

        // 2. تحديث قوائم السيادة (المطاعم والكباتن)
        renderSovereigntyCards('resListContainer', data.restaurants, 'store', 'RESTAURANT');
        renderSovereigntyCards('driverListContainer', data.drivers, 'user', 'DRIVER');
        
        lucide.createIcons();
    };

    function renderSovereigntyCards(id, list, icon, type) {
        let html = '';
        list.slice(1).forEach(item => {
            const status = item[4] === 'active' ? 'نشط' : 'موقوف';
            html += `
            <div class="col-md-6 col-xl-4">
                <div class="stat-widget">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="bg-light p-3 rounded-4"><i data-lucide="${icon}"></i></div>
                        <div class="flex-grow-1"><h6 class="fw-black m-0">${item[1]}</h6><small>${item[2]}</small></div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center pt-3 border-top">
                        <div class="d-flex gap-2">
                            <button class="sov-btn accept" onclick="sovAction('ACTIVATE', '${type}', '${item[2]}')" title="قبول انضمام"><i data-lucide="check" size="18"></i></button>
                            <button class="sov-btn pause" onclick="sovAction('PAUSE', '${type}', '${item[2]}')" title="توقيف مؤقت"><i data-lucide="pause" size="18"></i></button>
                            <button class="sov-btn delete" onclick="sovAction('DELETE', '${type}', '${item[2]}')" title="حذف نهائي"><i data-lucide="trash-2" size="18"></i></button>
                        </div>
                        <button class="contact-btn py-2 px-3" onclick="window.open('tel:${item[3]}')"><i data-lucide="phone" size="16"></i></button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById(id).innerHTML = html;
    }

    function sovAction(cmd, type, id) {
        if(confirm(`⚠️ سيادة المدير، هل أنت متأكد من تنفيذ أمر [${cmd}] على [${id}]؟`)) {
            const script = document.createElement('script');
            script.src = `${API_URL}?action=ADMIN_SOV&cmd=${cmd}&type=${type}&id=${id}&token=${API_TOKEN}&callback=onSovSuccess`;
            document.body.appendChild(script);
        }
    }

    window.onSovSuccess = (res) => { alert("✅ تم تنفيذ الأمر السيادي بنجاح."); refreshData(); };
    function trackDriver(name) { alert("جاري فتح رادار التتبع المباشر للكابتن: " + name); }
    function showTab(e, name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.add('d-none'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).classList.remove('d-none');
        e.currentTarget.classList.add('active');
        lucide.createIcons();
    }
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?callback=initMap"></script>
<script>
    function initMap() {
        new google.maps.Map(document.getElementById("adminMap"), {
            zoom: 13, center: { lat: 35.468, lng: 44.392 }, disableDefaultUI: true
        });
    }
</script>
</body>
</html>
